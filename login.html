<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mickey Spotify Clone & Writer</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    :root {
      --spotify-green: #1DB954;
      --spotify-black: #191414;
      --spotify-light-black: #282828;
      --text-white: #FFFFFF;
      --text-gray: #B3B3B3;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--spotify-black);
      color: var(--text-white);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* MAIN CONTENT */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow-y: auto;
      padding-bottom: 120px; /* Space for player */
    }

    /* EQUALIZER ANIMATION AREA */
    .equalizer-container {
      width: 100%;
      max-width: 600px;
      height: 100px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 3px;
      margin-bottom: 20px;
    }

    .bar {
      width: 8px;
      background: linear-gradient(to top, var(--spotify-green), #8ef8b3);
      border-radius: 4px 4px 0 0;
      transition: height 0.05s ease;
    }

    /* WRITER SECTION */
    .writer-card {
      width: 100%;
      max-width: 700px;
      background: var(--spotify-light-black);
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    input, textarea {
      background: #3e3e3e;
      border: none;
      border-radius: 8px;
      padding: 15px;
      color: white;
      width: 100%;
      margin-bottom: 15px;
      font-family: inherit;
    }

    textarea { height: 250px; resize: none; font-size: 1rem; border-left: 4px solid var(--spotify-green); }

    /* SPOTIFY MINI PLAYER (BOTTOM) */
    .spotify-player {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #181818;
      border-top: 1px solid #282828;
      padding: 15px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
    }

    .song-details { display: flex; align-items: center; gap: 15px; width: 30%; }
    .song-icon { width: 50px; height: 50px; background: #282828; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--spotify-green); }
    
    .player-controls { width: 40%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .control-btns { display: flex; align-items: center; gap: 25px; font-size: 20px; }
    .play-btn { font-size: 35px; cursor: pointer; transition: 0.2s; }
    .play-btn:hover { transform: scale(1.1); color: var(--spotify-green); }

    .progress-container { width: 100%; display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-gray); }
    .progress-bar { flex: 1; height: 4px; background: #4f4f4f; border-radius: 2px; cursor: pointer; position: relative; }
    .progress-fill { width: 0%; height: 100%; background: var(--spotify-green); border-radius: 2px; }

    .search-input-mini {
      background: #282828;
      padding: 8px 15px;
      border-radius: 20px;
      border: 1px solid #3e3e3e;
      color: white;
      font-size: 0.8rem;
    }

    @media (max-width: 768px) {
      .spotify-player { padding: 10px; }
      .song-details { display: none; }
      .player-controls { width: 100%; }
    }
  </style>
</head>
<body>

<div class="main-content">
  <div class="equalizer-container" id="equalizer">
    </div>

  <div class="writer-card">
    <h3 style="margin-bottom: 15px; color: var(--spotify-green);"><i class="fas fa-feather"></i> Lyrics Studio</h3>
    <input type="text" id="lyricsTitle" placeholder="Kichwa cha wimbo...">
    <textarea id="lyricsArea" placeholder="Anza kuandika mashairi yako hapa..."></textarea>
    
    <div style="text-align: right;">
      <button onclick="downloadFile()" style="background: var(--spotify-green); color: black; border: none; padding: 10px 25px; border-radius: 20px; font-weight: 700; cursor: pointer;">
        <i class="fas fa-download"></i> Save Song
      </button>
    </div>
  </div>
</div>

<div class="spotify-player">
  <div class="song-details">
    <div class="song-icon"><i class="fas fa-music"></i></div>
    <div>
      <div id="playingName" style="font-size: 0.9rem; font-weight: 600;">Subiri wimbo...</div>
      <div style="font-size: 0.75rem; color: var(--text-gray);">Mickey Studio</div>
    </div>
  </div>

  <div class="player-controls">
    <div class="control-btns">
      <i class="fas fa-random" style="font-size: 14px; color: var(--text-gray);"></i>
      <i class="fas fa-step-backward"></i>
      <i class="fas fa-play-circle play-btn" id="masterPlay" onclick="togglePlay()"></i>
      <i class="fas fa-step-forward"></i>
      <i class="fas fa-redo" style="font-size: 14px; color: var(--text-gray);"></i>
    </div>
    <div class="progress-container">
      <span id="currentTime">0:00</span>
      <div class="progress-bar" onclick="seek(event)">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span id="duration">0:00</span>
    </div>
  </div>

  <div style="width: 30%; text-align: right; display: flex; align-items: center; justify-content: flex-end; gap: 10px;">
    <input type="text" id="songSearch" class="search-input-mini" placeholder="Tafuta wimbo..." onkeypress="handleSearch(event)">
    <i class="fas fa-volume-up" style="color: var(--text-gray);"></i>
  </div>
</div>

<audio id="audioSource"></audio>

<script>
  const audio = document.getElementById('audioSource');
  const playBtn = document.getElementById('masterPlay');
  const progressFill = document.getElementById('progressFill');
  const equalizer = document.getElementById('equalizer');
  
  // 1. Create Equalizer Bars
  for (let i = 0; i < 40; i++) {
    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.height = '10px';
    equalizer.appendChild(bar);
  }
  const bars = document.querySelectorAll('.bar');

  // 2. Audio Visualizer Logic
  let audioCtx, analyser, dataArray;
  
  function initVisualizer() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaElementSource(audio);
    analyser = audioCtx.createAnalyser();
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    analyser.fftSize = 128;
    const bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);
    animate();
  }

  function animate() {
    requestAnimationFrame(animate);
    if (analyser) {
      analyser.getByteFrequencyData(dataArray);
      for (let i = 0; i < bars.length; i++) {
        const val = dataArray[i] || 0;
        const height = Math.max(10, (val / 255) * 100);
        bars[i].style.height = height + 'px';
      }
    }
  }

  // 3. Play/Pause Logic
  function togglePlay() {
    if (!audio.src) return alert("Tafuta wimbo kwanza!");
    initVisualizer();
    if (audio.paused) {
      audio.play();
      playBtn.className = "fas fa-pause-circle play-btn";
    } else {
      audio.pause();
      playBtn.className = "fas fa-play-circle play-btn";
    }
  }

  // 4. Search API Logic
  async function handleSearch(e) {
    if (e.key === 'Enter') {
      const query = e.target.value;
      const status = document.getElementById('playingName');
      status.innerText = "🔎 Inatafuta...";
      
      try {
        const response = await fetch(`https://api-aswin-sparky.koyeb.app/api/downloader/song?search=${encodeURIComponent(query)}`);
        const result = await response.json();
        const link = result.data?.url || result.url;
        
        if (link) {
          audio.src = link;
          status.innerText = result.data?.title || query;
          togglePlay();
        } else {
          status.innerText = "❌ Wimbo haujapatikana";
        }
      } catch (err) {
        status.innerText = "❌ Hitilafu ya seva";
      }
    }
  }

  // 5. Progress Bar Updates
  audio.ontimeupdate = () => {
    const pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = pct + "%";
    document.getElementById('currentTime').innerText = formatTime(audio.currentTime);
    document.getElementById('duration').innerText = formatTime(audio.duration);
  };

  function formatTime(sec) {
    if (!sec) return "0:00";
    let min = Math.floor(sec / 60);
    let s = Math.floor(sec % 60);
    return min + ":" + (s < 10 ? "0" + s : s);
  }

  function seek(e) {
    const rect = e.target.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const width = rect.width;
    audio.currentTime = (x / width) * audio.duration;
  }

  function downloadFile() {
    const text = document.getElementById('lyricsArea').value;
    const title = document.getElementById('lyricsTitle').value || "wimbo_wangu";
    if(!text) return alert("Andika mashairi!");
    const blob = new Blob([text], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = title + ".txt";
    a.click();
  }
</script>

</body>
</html>
