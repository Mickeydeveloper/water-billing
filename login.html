<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mickey Glitch v4 - All-in-One</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d2ff;
            --accent: #9d50bb;
            --bg: #0b0f19;
            --card: #161e2d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Segoe UI', sans-serif; }

        body {
            background: linear-gradient(135deg, #0b0f19 0%, #1e1b4b 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.08);
            text-align: center;
        }

        .logo-icon {
            font-size: 40px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 20px;
            letter-spacing: 2px;
            margin-bottom: 25px;
            color: #f8fafc;
        }

        .input-box {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border-radius: 14px;
            border: 2px solid #2d3748;
            background: #0f172a;
            color: white;
            outline: none;
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0,210,255,0.1); }

        .input-box i {
            position: absolute;
            left: 15px;
            top: 18px;
            color: #64748b;
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:active { transform: scale(0.98); }

        /* Status Area */
        #status-area {
            margin-top: 15px;
            font-size: 13px;
            color: #94a3b8;
            min-height: 20px;
        }

        /* Player UI */
        #player {
            display: none;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(255,255,255,0.1);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #title { font-weight: bold; font-size: 16px; margin-bottom: 15px; color: #fff; line-height: 1.4; }

        audio {
            width: 100%;
            height: 40px;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5);
            margin-bottom: 15px;
        }

        .download-btn {
            display: inline-block;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            padding: 8px 15px;
            border: 1px solid var(--primary);
            border-radius: 20px;
        }

        .download-btn:hover { background: var(--primary); color: #000; }

        .loader {
            width: 18px;
            height: 18px;
            border: 2px solid transparent;
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-icon"><i class="fas fa-bolt"></i></div>
    <h2>MICKEY GLITCH v4</h2>
    
    <div class="input-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Andika jina la wimbo hapa...">
    </div>
    
    <button id="mainBtn" onclick="processSearch()">
        <div class="loader" id="loader"></div>
        <span id="btnText">ANZA KUTAFUTA</span>
    </button>

    <div id="status-area">Tayari...</div>

    <div id="player">
        <p id="title">Jina la Wimbo...</p>
        <audio id="mAudio" controls></audio>
        <div>
            <a id="downLink" class="download-btn" href="#" target="_blank">
                <i class="fas fa-download"></i> PAKUA MP3
            </a>
        </div>
    </div>
</div>

<script>
    async function processSearch() {
        const query = document.getElementById('searchInput').value.trim();
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loader');
        const status = document.getElementById('status-area');
        const player = document.getElementById('player');
        const audio = document.getElementById('mAudio');

        if (!query) {
            alert("Tafadhali andika jina la wimbo!");
            return;
        }

        // 1. Maandalizi ya UI
        loader.style.display = "block";
        btnText.innerText = "INATAFUTA...";
        status.innerText = "🔄 Tunatafuta audio, subiri kidogo...";
        player.style.display = "none";

        try {
            // 2. Kutumia API moja kwa moja (inatambua jina au URL)
            const apiUrl = `https://api-aswin-sparky.koyeb.app/api/downloader/song?search=${encodeURIComponent(query)}`;
            
            const response = await fetch(apiUrl);
            const result = await response.json();

            // 3. Kukagua majibu ya API
            if (result.status && result.data && result.data.url) {
                const songData = result.data;

                // Weka data kwenye Player
                document.getElementById('title').innerText = songData.title;
                audio.src = songData.url;
                document.getElementById('downLink').href = songData.url;

                // Onyesha UI ya Player
                player.style.display = "block";
                status.innerText = "✅ Tayari! Bonyeza play.";
                
                // Play moja kwa moja (kama browser ikiruhusu)
                audio.play().catch(() => {
                    status.innerText = "✅ Bonyeza button ya Play kusikiliza.";
                });

            } else {
                status.innerText = "❌ Hitilafu: Wimbo haujapatikana.";
            }

        } catch (error) {
            console.error(error);
            status.innerText = "❌ Hitilafu ya mtandao au API.";
        } finally {
            loader.style.display = "none";
            btnText.innerText = "ANZA KUTAFUTA";
        }
    }
</script>

</body>
</html>
