<script>
    async function tafutaWimbo() {
        const query = document.getElementById('search').value.trim();
        const btn = document.getElementById('btn');
        const statusText = document.getElementById('statusText');
        const loader = document.getElementById('loader');
        const player = document.getElementById('player');

        if (!query) {
            alert("Tafadhali andika jina la wimbo!");
            return;
        }

        // Maandalizi
        btn.disabled = true;
        loader.style.display = "block";
        statusText.innerText = "🔍 Inatafuta na kuandaa audio...";
        player.style.display = "none";

        try {
            // Inaita API ya server yako uliyoitengeneza juu
            const res = await fetch(`/api/search-music?q=${encodeURIComponent(query)}`);
            const result = await res.json();

            if (result.status) {
                // Kujaza data kwenye UI
                document.getElementById('title').innerText = result.title;
                document.getElementById('thumb').src = result.thumbnail;
                document.getElementById('author').innerText = "Msanii: " + result.author;
                
                const audioPlayer = document.getElementById('audio');
                
                // MUHIMU: Kutumia audioUrl kutoka kwenye server yetu
                audioPlayer.src = result.audioUrl;
                document.getElementById('downBtn').href = result.audioUrl;

                // Onyesha kila kitu
                player.style.display = 'block';
                statusText.innerText = "✅ Wimbo umepatikana! Inacheza...";
                
                // Jaribu kucheza moja kwa moja
                audioPlayer.play().catch(() => {
                    statusText.innerText = "✅ Bonyeza Play kusikiliza.";
                });
            } else {
                statusText.innerText = "❌ Hitilafu: " + (result.error || "Wimbo haujapatikana.");
            }

        } catch (err) {
            console.error("Client Error:", err);
            statusText.innerText = "❌ Imeshindwa kuunganisha kwenye server.";
        } finally {
            btn.disabled = false;
            loader.style.display = "none";
        }
    }
</script>
