<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login — Water Billing</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600,700&display=swap" rel="stylesheet">
  <style>
    :root{--bg-1:#1e3a8a;--bg-2:#2563eb;--bg-3:#06b6d4;--card-bg:rgba(255,255,255,0.98);--accent-1:#2563eb;--accent-2:#06b6d4;--muted:#475569;--text-primary:#0f172a;--success:#059669;--error:#dc2626}
    *{box-sizing:border-box}
    body{font-family:'Poppins','Segoe UI',system-ui,Arial;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bg-1) 0%,var(--bg-2) 50%,var(--bg-3) 100%);padding:24px;letter-spacing:0.3px}
    .wrap{max-width:980px;width:100%;display:grid;grid-template-columns:1fr 420px;gap:32px;align-items:center;padding:0 12px}
    .hero{color:#fff;padding:32px;border-radius:12px}
    .hero h1{font-weight:800;font-size:2.5rem;margin-bottom:1rem}
    .brand{display:flex;align-items:center;gap:12px;font-weight:800;font-size:1.2rem}
    .logo{font-size:42px}
    .card{background:var(--card-bg);padding:26px;border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,0.12);border:1px solid rgba(255,255,255,0.3)}
    .card h2{color:var(--text-primary);font-weight:800;font-size:1.5rem}
    .small{font-size:0.95rem;color:var(--muted);font-weight:500}
    .btn-google{display:inline-flex;align-items:center;gap:10px;padding:12px 14px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent-1),var(--accent-2));color:#fff;font-weight:800;cursor:pointer;width:100%;text-decoration:none;letter-spacing:0.4px;transition:all 0.3s}
    .btn-google:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,99,235,0.3)}
    .btn-google img{height:20px}
    .or{display:flex;align-items:center;gap:12px;margin:16px 0}
    .or div{flex:1;height:1px;background:#e2e8f0}
    .or span{font-size:12px;color:var(--muted);font-weight:600}
    .form-row{margin-bottom:12px}
    input{width:100%;padding:11px;border-radius:10px;border:2px solid #cbd5e1;font-family:Poppins,sans-serif;font-size:0.95rem;color:var(--text-primary);transition:all 0.3s;font-weight:500}
    input:focus{outline:none;border-color:var(--accent-2);box-shadow:0 0 0 4px rgba(6,182,212,0.1);background:#f0f9ff}
    button.primary{padding:11px 12px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent-1),var(--accent-2));color:#fff;font-weight:800;cursor:pointer;width:100%;letter-spacing:0.4px;transition:all 0.3s;text-transform:uppercase;font-size:0.9rem}
    button.primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,99,235,0.3)}
    .link{display:block;text-align:center;margin-top:12px;font-weight:700;color:var(--accent-1);text-decoration:none;font-size:0.95rem;transition:all 0.3s}
    .link:hover{color:var(--accent-2)}
    #errorBanner{font-weight:700;color:var(--error)}

    /* Notification styles */
    #notify { position: fixed; right: 16px; top: 16px; z-index: 9999; pointer-events: none; }
    #notify .note { pointer-events: auto; min-width:220px; max-width:360px; padding:14px 16px; border-radius:12px; color:#fff; box-shadow:0 12px 30px rgba(0,0,0,0.2); transform-origin:center; transform: perspective(600px) translateZ(0) rotateX(0); opacity:0; transition: transform 260ms cubic-bezier(.2,.9,.2,1), opacity 260ms; margin-top:10px; font-weight:700 }
    #notify .note.show { opacity:1; transform: perspective(600px) translateZ(18px) rotateX(0deg) }
    #notify .note.info { background: linear-gradient(135deg,#2563eb,#06b6d4) }
    #notify .note.success { background: linear-gradient(135deg,#059669,#047857) }
    #notify .note.error { background: linear-gradient(135deg,#dc2626,#b91c1c) }

    @media (max-width:900px){.wrap{grid-template-columns:1fr}}
    @media (max-width:420px){.hero{padding:18px}.card{padding:18px}.hero h1{font-size:1.8rem}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="brand"><div class="logo">💧</div><div>Water Billing</div></div>
      <h1 style="margin:12px 0 6px">Billing made simple</h1>
      <p class="small">Sign in with Google or use your email/password.</p>
    </div>

    <div class="card" aria-labelledby="login-title">
      <h2 id="login-title" style="margin:0 0 8px">Welcome back</h2>
      <div id="errorBanner" style="display:none;margin-bottom:12px;padding:10px;border-radius:8px;background:#fff3f2;color:#b91c1c;border:1px solid rgba(239,68,68,0.08)"></div>
      <p class="small">Sign in to access billing tools and your records.</p>

      <a href="/auth/google"><button class="btn-google" aria-label="Continue with Google"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G"> Continue with Google</button></a>

      <div class="or"><div></div><span>or</span><div></div></div>

      <form id="emailSignIn">
        <div class="form-row"><input type="email" id="signin-email" placeholder="you@example.com" required></div>
        <div class="form-row"><input type="password" id="signin-pass" placeholder="Password" required></div>
        <button class="primary" type="submit">Sign in</button>
      </form>

      <a class="link" href="signup.html">Create an account</a>
      <a class="link" href="index.html" style="margin-top:6px;color:var(--muted)">Return to home</a>
    </div>
  </div>

  <div id="notify" aria-hidden="true"></div>

  <script>
    function showNotification(message, type = 'info', duration = 3000) {
      const container = document.getElementById('notify');
      const el = document.createElement('div');
      el.className = 'note ' + type;
      el.innerHTML = '<div style="font-weight:700">' + message + '</div>';
      container.appendChild(el);
      // show
      requestAnimationFrame(() => el.classList.add('show'));
      // hide
      setTimeout(() => {
        el.classList.remove('show');
        setTimeout(() => el.remove(), 300);
      }, duration);
    }

    function showError(msg){
      const el = document.getElementById('errorBanner');
      el.textContent = msg; el.style.display = 'block';
      showNotification(msg, 'error', 4000);
    }

    const params = new URLSearchParams(window.location.search);
    if (params.get('error')){
      const e = params.get('error');
      if (e === 'oauth') showError('Google sign-in failed. Please try again.');
      else showError(decodeURIComponent(e));
    }

    document.getElementById('emailSignIn').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('signin-email').value.trim();
      const password = document.getElementById('signin-pass').value;
      try{
        const resp = await fetch('/local-login', {
          method: 'POST',
          credentials: 'same-origin',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ email, password })
        });
        const data = await resp.json();
        if (!resp.ok) {
          showError(data.error || 'Sign in failed');
          return;
        }
        showNotification('Signed in successfully', 'success', 1200);
        // Signed in — go to dashboard
        setTimeout(() => { window.location.href = '/index.html'; }, 600);
      }catch(err){
        showError('Network error — please try again');
      }
    });
  </script>
</body>
</html>
