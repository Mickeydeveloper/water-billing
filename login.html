<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mickey Glitch v4 - API Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #00d2ff; --bg: #0d1117; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #161b22; padding: 35px; border-radius: 25px; width: 95%; max-width: 420px; text-align: center; border: 1px solid #30363d; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        h2 { color: var(--accent); margin-bottom: 25px; font-weight: 800; letter-spacing: -1px; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #30363d; background: #010409; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--accent); color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn:hover { transform: scale(1.02); background: #33e0ff; }
        .btn:disabled { background: #484f58; cursor: not-allowed; opacity: 0.6; }
        .player-area { margin-top: 30px; display: none; border-top: 1px solid #30363d; padding-top: 20px; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        audio { width: 100%; margin-top: 15px; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }
        .status { font-size: 13px; color: #8b949e; margin-top: 12px; min-height: 18px; }
        #songTitle { font-size: 15px; font-weight: 600; color: #e6edf3; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>MICKEY GLITCH v4</h2>
    <input type="text" id="urlInput" placeholder="Paste music link hapa...">
    <button class="btn" id="fetchBtn" onclick="getAudio()">START PLAYING</button>
    
    <div class="status" id="status">Weka link uanze kusikiliza</div>

    <div class="player-area" id="playerArea">
        <span id="songTitle">Pakia wimbo...</span>
        <audio id="mainAudio" controls preload="auto"></audio>
        <div style="margin-top: 20px;">
            <a id="dlLink" href="#" download style="color: var(--accent); text-decoration: none; font-size: 14px; font-weight: bold;">
                <i class="fas fa-download"></i> Pakua MP3 (Download)
            </a>
        </div>
    </div>
</div>

<script>
    async function getAudio() {
        const urlInput = document.getElementById('urlInput');
        const btn = document.getElementById('fetchBtn');
        const status = document.getElementById('status');
        const audio = document.getElementById('mainAudio');
        const playerArea = document.getElementById('playerArea');
        const songTitle = document.getElementById('songTitle');

        if(!urlInput.value.trim()) return alert("Tafadhali weka link!");

        // Reset UI
        btn.disabled = true;
        status.innerText = "⏳ Inatengeneza muunganisho wa API...";
        playerArea.style.display = "none";

        try {
            // Hatua ya 1: Kupata audio link kutoka kwenye API
            const response = await fetch(`https://api-aswin-sparky.koyeb.app/api/downloader/song?search=${encodeURIComponent(urlInput.value.trim())}`);
            
            if (!response.ok) throw new Error('API Response Error');
            
            const result = await response.json();
            const mp3Url = result.data?.url || result.url || (result.data && result.data.download);

            if(mp3Url) {
                status.innerText = "🚀 Inapakia muziki... (Hii inatatua Network Error)";
                
                // Hatua ya 2: Kutumia Proxy au Blob kuzuia CORS Error
                // Tunavuta data kama blob ili kuondoa utegemezi wa server ya asili
                const audioFetch = await fetch(mp3Url);
                const audioBlob = await audioFetch.blob();
                const safeUrl = URL.createObjectURL(audioBlob);

                audio.src = safeUrl;
                songTitle.innerText = result.data?.title || "Mickey Music Playback";
                document.getElementById('dlLink').href = mp3Url;

                playerArea.style.display = "block";
                status.innerText = "✅ Tayari! Muziki unacheza.";
                audio.play().catch(e => {
                    status.innerText = "⚠️ Bonyeza Play kusikiliza.";
                });
            } else {
                status.innerText = "❌ Hitilafu: API haijapata audio link.";
            }
        } catch (error) {
            console.error(error);
            status.innerText = "❌ Hitilafu ya Mtandao! Jaribu link nyingine au Refresh.";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
