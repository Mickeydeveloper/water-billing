<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>Mickey Glitch v4</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .box { background: #1e293b; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        input { width: 80%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #00d2ff; border: none; cursor: pointer; font-weight: bold; }
        #player { display: none; margin-top: 20px; }
        img { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2>MICKEY GLITCH V4</h2>
    <input type="text" id="search" placeholder="Andika jina la wimbo...">
    <button onclick="tafutaWimbo()">TAFUTA</button>

    <div id="player">
        <img id="thumb" src="">
        <h4 id="title"></h4>
        <p id="author"></p>
        <audio id="audio" controls autoplay></audio>
    </div>
</div>

<script>
    async function tafutaWimbo() {
        const q = document.getElementById('search').value;
        const player = document.getElementById('player');
        
        // 1. Inaita API yetu ya Node.js (yt-search)
        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();

        if(data.url) {
            document.getElementById('title').innerText = data.title;
            document.getElementById('thumb').src = data.thumbnail;
            document.getElementById('author').innerText = data.author.name;
            
            // 2. Tunatumia API ya aswin-sparky ku-play (kama ulivyofanya mwanzo)
            const audioRes = await fetch(`https://api-aswin-sparky.koyeb.app/api/downloader/song?search=${encodeURIComponent(data.url)}`);
            const audioData = await audioRes.json();
            
            document.getElementById('audio').src = audioData.data.url;
            player.style.display = 'block';
        }
    }
</script>

</body>
</html>
