<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mickey Ultra Player Fix</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root { --primary: #00f2fe; --bg: #0b0e14; --text: #ffffff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #0f172a;
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      padding: 30px;
      border-radius: 25px;
      width: 90%;
      max-width: 450px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .url-input {
      width: 100%;
      padding: 15px 20px;
      border-radius: 50px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
      margin: 20px 0;
      outline: none;
    }
    .btn {
      width: 100%;
      padding: 15px;
      border-radius: 50px;
      border: none;
      background: var(--primary);
      font-weight: 700;
      cursor: pointer;
    }
    .player-bar {
      margin-top: 30px;
      width: 100%;
      display: none;
    }
    .play-icon { font-size: 3rem; cursor: pointer; color: var(--primary); }
    .status { font-size: 0.8rem; color: #94a3b8; margin-top: 10px; }
  </style>
</head>
<body>

<div class="glass-card">
  <h2>MICKEY PLAYER</h2>
  <p class="status" id="status">Paste Link and Play</p>
  
  <input type="text" id="url" class="url-input" placeholder="YouTube or Spotify link...">
  <button class="btn" onclick="fetchMusic()" id="actionBtn">PROCESS & PLAY</button>

  <div class="player-bar" id="playerArea">
    <div id="songTitle" style="margin-bottom: 10px; font-weight: bold;"></div>
    <i class="fas fa-play-circle play-icon" id="playBtn" onclick="toggle()"></i>
    <div style="margin-top:10px;">
       <span id="curr">0:00</span> / <span id="dur">0:00</span>
    </div>
  </div>
</div>

<audio id="player" crossorigin="anonymous" preload="auto"></audio>

<script>
  const audio = document.getElementById('player');
  const btn = document.getElementById('actionBtn');
  const status = document.getElementById('status');

  async function fetchMusic() {
    const val = document.getElementById('url').value;
    if(!val) return alert("Weka link!");

    btn.disabled = true;
    status.innerText = "Processing link... please wait";

    try {
      // Tunatumia API hii ambayo ni thabiti zaidi kwa Direct Links
      const res = await fetch(`https://api-aswin-sparky.koyeb.app/api/downloader/song?search=${encodeURIComponent(val)}`);
      const json = await res.json();
      
      // Baadhi ya API zinarudisha "url" au "downloadUrl" au ndani ya "data"
      const mp3 = json.data?.url || json.url || (json.data && json.data.download);

      if(mp3) {
        // FIXED: Baadhi ya browser zinahitaji kuanzishwa kwa audio kupitia user interaction
        audio.src = mp3;
        audio.load(); // Lazimisha kupakia upya
        
        document.getElementById('songTitle').innerText = json.data?.title || "Music Loaded";
        document.getElementById('playerArea').style.display = "block";
        
        // Jaribu kucheza
        const playPromise = audio.play();
        if (playPromise !== undefined) {
            playPromise.then(_ => {
                updateUI(true);
                status.innerText = "Playing now ✅";
            }).catch(error => {
                status.innerText = "Click the Play button manually";
                updateUI(false);
            });
        }
      } else {
        status.innerText = "❌ Could not get Audio. Try another link.";
      }
    } catch (e) {
      status.innerText = "❌ Connection Error";
      console.error(e);
    } finally {
      btn.disabled = false;
    }
  }

  function toggle() {
    if(audio.paused) {
      audio.play();
      updateUI(true);
    } else {
      audio.pause();
      updateUI(false);
    }
  }

  function updateUI(playing) {
    document.getElementById('playBtn').className = playing ? "fas fa-pause-circle play-icon" : "fas fa-play-circle play-icon";
  }

  audio.ontimeupdate = () => {
    document.getElementById('curr').innerText = format(audio.currentTime);
    document.getElementById('dur').innerText = format(audio.duration);
  };

  function format(s) {
    if(isNaN(s)) return "0:00";
    let m = Math.floor(s/60);
    let sec = Math.floor(s%60);
    return `${m}:${sec < 10 ? '0'+sec : sec}`;
  }
</script>

</body>
</html>
