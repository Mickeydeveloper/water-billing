<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login - Water Billing</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    :root{
      --bg-1: #667eea;
      --bg-2: #764ba2;
      --card-bg: rgba(255,255,255,0.96);
      --accent-1: #1e40af;
      --accent-2: #0ea5e9;
      --muted: #64748b;
      --radius: 14px;
    }

    *{box-sizing:border-box}
    body{
      font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
      margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
      background: linear-gradient(135deg,var(--bg-1) 0%, var(--bg-2) 100%);
      padding:24px;color:#0f172a;
    }

    .wrap{max-width:980px;width:100%;display:grid;grid-template-columns:1fr 420px;gap:32px;align-items:center}
    .hero{color:#fff;padding:32px;border-radius:var(--radius);}
    .brand{display:flex;align-items:center;gap:12px;font-weight:700}
    .brand .logo{font-size:42px}
    .hero h1{font-size:28px;margin:12px 0}
    .hero p{color:rgba(255,255,255,0.9);max-width:44ch}

    .card{background:var(--card-bg);padding:26px;border-radius:var(--radius);box-shadow:0 12px 40px rgba(2,6,23,0.25)}
    .small{font-size:0.95rem;color:var(--muted)}

    .btn-google{display:inline-flex;align-items:center;gap:10px;padding:12px 14px;border-radius:10px;border:none;background:linear-gradient(90deg,var(--accent-1),var(--accent-2));color:#fff;font-weight:700;cursor:pointer;width:100%}
    .btn-google img{height:20px}

    .or{display:flex;align-items:center;gap:12px;margin:16px 0}
    .or div{flex:1;height:1px;background:#e6e9ef}
    .or span{font-size:12px;color:var(--muted)}

    .link{display:block;text-align:center;margin-top:12px;font-weight:600;color:var(--accent-1);text-decoration:none}

    /* Signup form style (email sign-up on same login card) */
    .form-row{margin-bottom:12px}
    input{width:100%;padding:10px;border-radius:8px;border:1px solid #e6e9ef}
    button.primary{padding:10px 12px;border-radius:10px;border:none;background:linear-gradient(90deg,var(--accent-1),var(--accent-2));color:#fff;font-weight:700;cursor:pointer;width:100%}

    @media (max-width:900px){
      .wrap{grid-template-columns:1fr;}
    }
</style>
<head>

  <meta name="viewport" content="width=device-width,initial-scale=1">

  <style>

<body>
  <div class="wrap">
    <div class="hero">
      <div class="brand"><div class="logo">💧</div><div>Water Billing</div></div>
      <h1>Fast, clear billing for your customers</h1>
      <p>Sign in quickly with Google or create an account. Your session is stored securely on the server.</p>
    </div>

    <div class="card" aria-labelledby="login-title">
      <h2 id="login-title" style="margin:0 0 10px 0">Welcome back</h2>
      <p class="small">Sign in to access billing tools and records.</p>

      <a href="/auth/google"><button class="btn-google" aria-label="Continue with Google"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G"> Continue with Google</button></a>

      <div class="or"><div></div><span>or</span><div></div></div>

      <div style="margin-bottom:8px"><strong class="small">Use email to sign in</strong></div>
      <form id="emailSignIn" onsubmit="event.preventDefault();alert('This demo uses Google OAuth — use Continue with Google.')">
        <div class="form-row"><input type="email" id="signin-email" placeholder="you@example.com" required></div>
        <div class="form-row"><input type="password" id="signin-pass" placeholder="Password" required></div>
        <button class="primary" type="submit">Sign in</button>
      </form>

      <a class="link" href="signup.html">Create an account</a>
      <a class="link" href="index.html" style="margin-top:6px;color:var(--muted)">Return to home</a>
    </div>
  </div>
</body>
</html>
