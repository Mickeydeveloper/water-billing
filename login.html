<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mickey Glitch v4 - Fixed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #00d2ff; --bg: #161b22; }
        body { font-family: sans-serif; background: #0d1117; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #161b22; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: var(--accent); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #30363d; background: #0d1117; color: white; outline: none; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--accent); color: black; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:disabled { background: #484f58; }
        .player-area { margin-top: 25px; display: none; }
        audio { width: 100%; margin-top: 15px; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }
        .status { font-size: 12px; color: #8b949e; margin-top: 10px; }
        #songTitle { font-size: 14px; font-weight: bold; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>MICKEY GLITCH v4</h2>
    <input type="text" id="urlInput" placeholder="Paste link hapa...">
    <button class="btn" id="fetchBtn" onclick="getAudio()">START PLAYING</button>
    
    <div class="status" id="status">Weka link uanze kusikiliza</div>

    <div class="player-area" id="playerArea">
        <span id="songTitle">Pakia wimbo...</span>
        <audio id="mainAudio" controls></audio>
        <br><br>
        <a id="dlLink" href="#" download style="color: var(--accent); text-decoration: none; font-size: 14px;">
            <i class="fas fa-download"></i> Download MP3
        </a>
    </div>
</div>

<script>
    async function getAudio() {
        const url = document.getElementById('urlInput').value.trim();
        const btn = document.getElementById('fetchBtn');
        const status = document.getElementById('status');
        const audio = document.getElementById('mainAudio');
        const playerArea = document.getElementById('playerArea');

        if(!url) return alert("Weka link kwanza!");

        btn.disabled = true;
        status.innerText = "Inatengeneza muunganisho... (Inapiga kazi 🚀)";

        try {
            const res = await fetch(`https://api-aswin-sparky.koyeb.app/api/downloader/song?search=${encodeURIComponent(url)}`);
            const result = await res.json();
            const mp3Url = result.data?.url || result.url || (result.data && result.data.download);

            if(mp3Url) {
                // MBINU MPYA: Badala ya ku-play link, tunaigeuza kuwa Blob
                status.innerText = "Inapakia audio kwenye kicheza muziki...";
                
                const audioRes = await fetch(mp3Url);
                const blob = await audioRes.blob();
                const blobUrl = URL.createObjectURL(blob);

                audio.src = blobUrl;
                document.getElementById('songTitle').innerText = result.data?.title || "Mickey Music";
                document.getElementById('dlLink').href = mp3Url;

                playerArea.style.display = "block";
                status.innerText = "Tayari! Bonyeza Play kusikiliza.";
                audio.play().catch(() => console.log("Autoplay blocked"));
            } else {
                status.innerText = "❌ Imeshindikana kupata audio.";
            }
        } catch (e) {
            status.innerText = "❌ Hitilafu ya mtandao au API.";
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
