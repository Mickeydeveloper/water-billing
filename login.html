<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mickey Glitch - Link to Music Player</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    :root {
      --spotify-green: #1DB954;
      --spotify-black: #191414;
      --spotify-light-black: #282828;
      --text-white: #FFFFFF;
      --text-gray: #B3B3B3;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--spotify-black);
      color: var(--text-white);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* EQUALIZER */
    .equalizer-container {
      width: 100%;
      max-width: 600px;
      height: 120px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 3px;
      margin-bottom: 40px;
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      padding: 10px;
    }

    .bar {
      width: 10px;
      background: var(--spotify-green);
      border-radius: 5px 5px 0 0;
      transition: height 0.1s ease;
    }

    /* LINK INPUT CARD */
    .link-card {
      width: 100%;
      max-width: 600px;
      background: var(--spotify-light-black);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      text-align: center;
    }

    .link-input {
      background: #3e3e3e;
      border: 2px solid transparent;
      border-radius: 30px;
      padding: 15px 25px;
      color: white;
      width: 100%;
      margin-bottom: 20px;
      font-size: 1rem;
      transition: 0.3s;
      outline: none;
    }

    .link-input:focus {
      border-color: var(--spotify-green);
      background: #454545;
    }

    .btn-convert {
      background: var(--spotify-green);
      color: black;
      border: none;
      padding: 15px 40px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      width: 100%;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-convert:hover {
      transform: scale(1.02);
      background: #1ed760;
    }

    .btn-convert:disabled {
      background: #4f4f4f;
      cursor: not-allowed;
    }

    /* PLAYER AREA */
    .spotify-player {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #121212;
      border-top: 1px solid #282828;
      padding: 15px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .song-details { display: flex; align-items: center; gap: 15px; width: 30%; }
    .song-icon { 
        width: 55px; height: 55px; 
        background: #282828; 
        border-radius: 50%; 
        display: flex; align-items: center; justify-content: center; 
        font-size: 24px; color: var(--spotify-green);
        border: 2px solid #333;
    }

    .player-controls { width: 40%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .control-btns { display: flex; align-items: center; gap: 20px; }
    .play-btn { font-size: 45px !important; color: white; cursor: pointer; }
    .play-btn:hover { color: var(--spotify-green); }

    .progress-container { width: 100%; display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--text-gray); }
    .progress-bar { flex: 1; height: 5px; background: #4f4f4f; border-radius: 5px; cursor: pointer; position: relative; }
    .progress-fill { width: 0%; height: 100%; background: var(--spotify-green); border-radius: 5px; }

    .rotating { animation: rotate 3s linear infinite; }
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .song-details { display: none; }
      .player-controls { width: 100%; }
    }
  </style>
</head>
<body>

<div class="main-content">
  <div class="equalizer-container" id="equalizer"></div>

  <div class="link-card">
    <h2 style="margin-bottom: 10px; color: var(--spotify-green); letter-spacing: -1px;">Mickey Music Downloader</h2>
    <p style="color: var(--text-gray); font-size: 0.85rem; margin-bottom: 25px;">Weka link ya YouTube au Spotify hapa chini kucheza muziki.</p>
    
    <input type="text" id="musicLink" class="link-input" placeholder="Bandika link hapa (e.g. https://youtube.com/...)">
    <button id="convertBtn" onclick="processLink()" class="btn-convert">
      <i class="fas fa-magic"></i> Convert & Play
    </button>
  </div>
</div>

<div class="spotify-player">
  <div class="song-details">
    <div class="song-icon" id="discIcon"><i class="fas fa-compact-disc"></i></div>
    <div style="overflow: hidden;">
      <div id="playingName" style="font-size: 0.9rem; font-weight: 600; white-space: nowrap; text-overflow: ellipsis;">Tayari kupokea link...</div>
      <div style="font-size: 0.7rem; color: var(--text-gray);">Mickey Glitch Studio</div>
    </div>
  </div>

  <div class="player-controls">
    <div class="control-btns">
      <i class="fas fa-undo" onclick="skip(-10)" style="cursor:pointer;"></i>
      <i class="fas fa-play-circle play-btn" id="masterPlay" onclick="togglePlay()"></i>
      <i class="fas fa-redo" onclick="skip(10)" style="cursor:pointer;"></i>
    </div>
    <div class="progress-container">
      <span id="currentTime">0:00</span>
      <div class="progress-bar" onclick="seek(event)">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span id="duration">0:00</span>
    </div>
  </div>

  <div style="width: 30%; text-align: right;">
    <i class="fas fa-volume-up" style="color: var(--text-gray); font-size: 1.2rem;"></i>
  </div>
</div>

<audio id="audioSource" crossorigin="anonymous"></audio>

<script>
  const audio = document.getElementById('audioSource');
  const playBtn = document.getElementById('masterPlay');
  const progressFill = document.getElementById('progressFill');
  const equalizer = document.getElementById('equalizer');
  const disc = document.getElementById('discIcon');

  // Generate Bars
  for (let i = 0; i < 40; i++) {
    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.height = '10px';
    equalizer.appendChild(bar);
  }
  const bars = document.querySelectorAll('.bar');

  let audioCtx, analyser, dataArray;

  function initVisualizer() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaElementSource(audio);
    analyser = audioCtx.createAnalyser();
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    analyser.fftSize = 128;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    animate();
  }

  function animate() {
    requestAnimationFrame(animate);
    if (!analyser || audio.paused) {
        bars.forEach(b => b.style.height = '10px');
        return;
    }
    analyser.getByteFrequencyData(dataArray);
    for (let i = 0; i < bars.length; i++) {
      const val = dataArray[i % dataArray.length];
      const height = Math.max(10, (val / 255) * 110);
      bars[i].style.height = height + 'px';
    }
  }

  async function processLink() {
    const link = document.getElementById('musicLink').value.trim();
    const btn = document.getElementById('convertBtn');
    const status = document.getElementById('playingName');

    if (!link) return alert("Tafadhali weka link kwanza!");

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Inatafuta...';
    status.innerText = "Inatengeneza wimbo wako...";

    try {
      // Kutumia API kufungua link na kupata audio
      const response = await fetch(`https://api-aswin-sparky.koyeb.app/api/downloader/song?search=${encodeURIComponent(link)}`);
      const result = await response.json();
      
      const audioUrl = result.data?.url || result.url || (result.data && result.data.downloadUrl);
      
      if (audioUrl) {
        audio.src = audioUrl;
        status.innerText = result.data?.title || "Wimbo Umepatikana";
        audio.play();
        playBtn.className = "fas fa-pause-circle play-btn";
        disc.classList.add('rotating');
        initVisualizer();
      } else {
        alert("Link hii haikuweza kufunguliwa. Jaribu link nyingine.");
        status.innerText = "Hitilafu imetokea.";
      }
    } catch (err) {
      alert("Seva ina matatizo, jaribu tena baadaye.");
      status.innerText = "Hitilafu ya Seva.";
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-magic"></i> Convert & Play';
    }
  }

  function togglePlay() {
    if (!audio.src) return alert("Weka link na ubonyeze Convert kwanza!");
    if (audio.paused) {
      audio.play();
      playBtn.className = "fas fa-pause-circle play-btn";
      disc.classList.add('rotating');
    } else {
      audio.pause();
      playBtn.className = "fas fa-play-circle play-btn";
      disc.classList.remove('rotating');
    }
  }

  function skip(time) { audio.currentTime += time; }

  audio.ontimeupdate = () => {
    const pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = pct + "%";
    document.getElementById('currentTime').innerText = formatTime(audio.currentTime);
    document.getElementById('duration').innerText = formatTime(audio.duration);
  };

  function formatTime(sec) {
    if (isNaN(sec)) return "0:00";
    let m = Math.floor(sec / 60), s = Math.floor(sec % 60);
    return m + ":" + (s < 10 ? "0" + s : s);
  }

  function seek(e) {
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  }
</script>

</body>
</html>
