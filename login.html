<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mickey Glitch v4 - Premium Music</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d2ff;
            --accent: #9d50bb;
            --bg: #0f172a;
            --card: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        h2 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .search-group {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border-radius: 12px;
            border: 2px solid #334155;
            background: #0f172a;
            color: white;
            outline: none;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); }

        .search-group i {
            position: absolute;
            left: 15px;
            top: 18px;
            color: #64748b;
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3);
            transition: 0.3s;
        }

        button:hover { transform: translateY(-2px); opacity: 0.9; }
        button:disabled { background: #475569; cursor: not-allowed; }

        /* Status Steps */
        #status-box {
            margin-top: 15px;
            font-size: 13px;
            color: #94a3b8;
            height: 20px;
        }

        /* Player UI */
        #player {
            display: none;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid #334155;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .thumb-wrap {
            position: relative;
            margin-bottom: 15px;
        }

        img {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        #title { margin: 10px 0 5px; font-size: 18px; color: #f8fafc; }
        #author { font-size: 14px; color: var(--primary); margin-bottom: 15px; }

        audio {
            width: 100%;
            height: 45px;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5);
        }

        .loader {
            display: none;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h2>MICKEY GLITCH V4</h2>
    
    <div class="search-group">
        <i class="fas fa-music"></i>
        <input type="text" id="search" placeholder="Tafuta wimbo au msanii...">
    </div>
    
    <button id="btn" onclick="tafutaWimbo()">
        <span id="btnText">TAFUTA & PLAY</span>
    </button>

    <div id="status-box">
        <div class="loader" id="loader"></div>
        <span id="statusText">Tayari kutafuta...</span>
    </div>

    <div id="player">
        <div class="thumb-wrap">
            <img id="thumb" src="" alt="Thumbnail">
        </div>
        <h4 id="title"></h4>
        <p id="author"></p>
        <audio id="audio" controls></audio>
        <div style="margin-top: 15px;">
            <a id="downBtn" href="#" target="_blank" style="color: var(--primary); text-decoration: none; font-size: 14px;">
                <i class="fas fa-download"></i> Pakua Wimbo
            </a>
        </div>
    </div>
</div>

<script>
    async function tafutaWimbo() {
        const query = document.getElementById('search').value.trim();
        const btn = document.getElementById('btn');
        const statusText = document.getElementById('statusText');
        const loader = document.getElementById('loader');
        const player = document.getElementById('player');

        if (!query) {
            alert("Tafadhali andika jina la wimbo!");
            return;
        }

        // Maandalizi
        btn.disabled = true;
        loader.style.display = "block";
        statusText.innerText = "1/2 Inatafuta YouTube...";
        player.style.display = "none";

        try {
            // Hatua ya 1: Search kutumia server yako (yt-search)
            const res = await fetch(`/api/search-music?q=${encodeURIComponent(query)}`);
            const data = await res.json();

            if (!data.url) throw new Error("Wimbo haujapatikana.");

            statusText.innerText = "2/2 Inatengeneza Audio Link...";

            // Hatua ya 2: Kupata Audio Link kutoka API ya Aswin
            const audioRes = await fetch(`https://api-aswin-sparky.koyeb.app/api/downloader/song?search=${encodeURIComponent(data.url)}`);
            const audioData = await audioRes.json();

            if (audioData.success && audioData.data.url) {
                // Jaza data kwenye UI
                document.getElementById('title').innerText = data.title;
                document.getElementById('thumb').src = data.thumbnail;
                document.getElementById('author').innerText = "By: " + data.author;
                
                const audioPlayer = document.getElementById('audio');
                audioPlayer.src = audioData.data.url;
                document.getElementById('downBtn').href = audioData.data.url;

                // Onyesha Player
                player.style.display = 'block';
                statusText.innerText = "✅ Tayari! Furahia Muziki.";
                audioPlayer.play();
            } else {
                statusText.innerText = "❌ Imeshindwa kupata Audio.";
            }

        } catch (err) {
            console.error(err);
            statusText.innerText = "❌ Hitilafu! Jaribu tena.";
        } finally {
            btn.disabled = false;
            loader.style.display = "none";
        }
    }
</script>

</body>
</html>
