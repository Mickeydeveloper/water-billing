<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mickey Music Writer & Player</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap">
  
  <style>
    :root {
      --primary-color: #764ba2;
      --secondary-color: #667eea;
      --background-dark: #0f172a;
      --glass: rgba(255, 255, 255, 0.1);
      --border-radius: 16px;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app-container {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      padding: 2rem;
      border-radius: var(--border-radius);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 800px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    h1 { text-align: center; margin-bottom: 20px; font-weight: 700; }

    /* SEHEMU YA KICHEZA MUZIKI */
    .player-section {
      background: rgba(0, 0, 0, 0.2);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      text-align: center;
    }

    input[type="text"], textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      outline: none;
      font-family: inherit;
    }

    textarea { height: 150px; resize: none; }

    .btn {
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
      margin: 5px;
    }

    .btn:hover { opacity: 0.9; transform: translateY(-2px); }

    audio { width: 100%; margin-top: 10px; border-radius: 8px; }

    .lyrics-view {
      background: white;
      color: #333;
      padding: 15px;
      border-radius: 8px;
      margin-top: 10px;
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <h1>🎵 Mickey Music Studio</h1>

    <div class="player-section">
      <h3>Music Player</h3>
      <input type="text" id="songUrl" placeholder="Weka URL ya wimbo (mp3 link)...">
      <audio id="audioPlayer" controls>
        <source src="" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
      <div style="margin-top: 10px;">
        <button class="btn" onclick="playSong()">Play Song</button>
      </div>
    </div>

    <div class="writer-section">
      <h3>Lyrics Writer</h3>
      <input type="text" id="songTitle" placeholder="Jina la wimbo...">
      <textarea id="lyricsInput" placeholder="Anza kuandika mashairi yako hapa..."></textarea>
      
      <div style="display: flex; justify-content: space-between;">
        <button class="btn" onclick="saveLyrics()">Save Lyrics</button>
        <button class="btn" style="background: #10b981;" onclick="downloadLyrics()">Download .txt</button>
      </div>
    </div>

    <div id="lyricsDisplay" class="lyrics-view"></div>
  </div>

  <script>
    // 1. Kazi ya kucheza wimbo
    function playSong() {
      const url = document.getElementById('songUrl').value;
      const player = document.getElementById('audioPlayer');
      
      if(url) {
        player.src = url;
        player.play();
      } else {
        alert("Tafadhali weka link ya wimbo!");
      }
    }

    // 2. Kazi ya kuhifadhi maneno (ndani ya browser)
    function saveLyrics() {
      const title = document.getElementById('songTitle').value;
      const content = document.getElementById('lyricsInput').value;
      const display = document.getElementById('lyricsDisplay');

      if(!title || !content) {
        alert("Jaza kichwa cha habari na maneno!");
        return;
      }

      display.style.display = "block";
      display.innerText = `WIMBO: ${title}\n\n${content}`;
      alert("Yamehifadhiwa kwenye kioo!");
    }

    // 3. Kazi ya Kudownload kama file
    function downloadLyrics() {
      const title = document.getElementById('songTitle').value || "wimbo";
      const content = document.getElementById('lyricsInput').value;

      if(!content) {
        alert("Andika kitu kabla ya kudownload!");
        return;
      }

      const element = document.createElement('a');
      const file = new Blob([content], {type: 'text/plain'});
      element.href = URL.createObjectURL(file);
      element.download = `${title}.txt`;
      document.body.appendChild(element);
      element.click();
      document.body.removeChild(element);
    }
  </script>
</body>
</html>
