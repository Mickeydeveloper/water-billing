<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Manager - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ff1744, #f50057);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        /* Navigation Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            overflow-x: auto;
        }

        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            font-weight: 500;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .tab-btn:hover {
            color: #e2e8f0;
        }

        .tab-btn.active {
            color: #ff1744;
            border-bottom-color: #ff1744;
        }

        /* Content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #cbd5e1;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px 12px;
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: #e2e8f0;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #ff1744;
            box-shadow: 0 0 0 3px rgba(255, 23, 68, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff1744, #f50057);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 23, 68, 0.3);
        }

        .btn-secondary {
            background: #1e293b;
            color: #e2e8f0;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-secondary:hover {
            background: #334155;
        }

        .btn-danger {
            background: #dc2626;
            color: white;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        .btn-success {
            background: #16a34a;
            color: white;
        }

        .btn-success:hover {
            background: #15803d;
        }

        /* Tables */
        .table-container {
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #0f172a;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #94a3b8;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        tr:hover {
            background: rgba(255, 23, 68, 0.05);
        }

        /* Status Badge */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-active {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
        }

        .badge-inactive {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .badge-drm {
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1e293b;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #e2e8f0;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff1744, #f50057);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Alert */
        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .alert-info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #93c5fd;
        }

        /* Actions */
        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.85rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .tabs {
                flex-wrap: wrap;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 0.9rem;
            }

            td, th {
                padding: 10px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn-sm {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>📺 Stream Manager</h1>
            <p class="subtitle">Manage DASH live streaming channels and configurations</p>
        </header>

        <!-- Alert Messages -->
        <div class="alert alert-success" id="successAlert"></div>
        <div class="alert alert-error" id="errorAlert"></div>

        <!-- Navigation Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('channels')">Channels</button>
            <button class="tab-btn" onclick="switchTab('add-channel')">Add Channel</button>
            <button class="tab-btn" onclick="switchTab('analytics')">Analytics</button>
        </div>

        <!-- Channels Tab -->
        <div id="channels" class="tab-content active">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="font-size: 1.5rem;">Live Channels</h2>
                <button class="btn btn-primary" onclick="switchTab('add-channel')">+ Add Channel</button>
            </div>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Channel Name</th>
                            <th>Category</th>
                            <th>Status</th>
                            <th>DRM</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="channelsTable">
                        <tr>
                            <td colspan="5" style="text-align: center; color: #94a3b8;">Loading channels...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Add Channel Tab -->
        <div id="add-channel" class="tab-content">
            <h2 style="font-size: 1.5rem; margin-bottom: 20px;">Add New Channel</h2>
            
            <form onsubmit="addChannel(event)">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Channel Name *</label>
                        <input type="text" id="channelName" required placeholder="e.g., Azam Two">
                    </div>

                    <div class="form-group">
                        <label>Category *</label>
                        <input type="text" id="channelCategory" required placeholder="e.g., Movies">
                    </div>
                </div>

                <div class="form-group">
                    <label>DASH Manifest URL *</label>
                    <input type="url" id="manifestUrl" required placeholder="https://example.com/stream.mpd">
                </div>

                <div class="form-group">
                    <label>Poster Image URL</label>
                    <input type="url" id="posterUrl" placeholder="https://example.com/poster.jpg">
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="channelDescription" placeholder="Channel description..."></textarea>
                </div>

                <div style="background: #0f172a; padding: 20px; border-radius: 8px; margin: 20px 0;">
                    <h3 style="margin-bottom: 15px;">DRM Configuration</h3>
                    
                    <div class="form-group">
                        <label style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="enableDRM"> Enable DRM Protection
                        </label>
                    </div>

                    <div id="drmConfig" style="display: none;">
                        <div class="form-group">
                            <label>License Server URL</label>
                            <input type="url" id="licenseUrl" placeholder="https://example.com/drm/license">
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div class="form-group">
                                <label>Key ID</label>
                                <input type="text" id="keyId" placeholder="d012a9d5834f69be1313d4864d150a5f">
                            </div>

                            <div class="form-group">
                                <label>Key Value</label>
                                <input type="text" id="keyValue" placeholder="3b92b644635f3bad9f7d09ded676ec47">
                            </div>
                        </div>
                    </div>
                </div>

                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-primary">Add Channel</button>
                    <button type="button" class="btn btn-secondary" onclick="switchTab('channels')">Cancel</button>
                </div>
            </form>
        </div>

        <!-- Analytics Tab -->
        <div id="analytics" class="tab-content">
            <h2 style="font-size: 1.5rem; margin-bottom: 20px;">Stream Analytics</h2>
            
            <div class="stats-grid" id="analyticsGrid">
                <div class="stat-card">
                    <div class="stat-label">Total Channels</div>
                    <div class="stat-value" id="totalChannels">-</div>
                </div>

                <div class="stat-card">
                    <div class="stat-label">Active Channels</div>
                    <div class="stat-value" id="activeChannels">-</div>
                </div>

                <div class="stat-card">
                    <div class="stat-label">DRM Enabled</div>
                    <div class="stat-value" id="drmChannels">-</div>
                </div>

                <div class="stat-card">
                    <div class="stat-label">Last Updated</div>
                    <div class="stat-value" id="lastUpdated" style="font-size: 0.9rem;">-</div>
                </div>
            </div>

            <button class="btn btn-primary" onclick="loadAnalytics()">Refresh Analytics</button>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">Edit Channel</div>
            
            <form onsubmit="updateChannel(event)">
                <input type="hidden" id="editChannelId">

                <div class="form-group">
                    <label>Channel Name</label>
                    <input type="text" id="editName" required>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="editCategory" required>
                </div>

                <div class="form-group">
                    <label>Manifest URL</label>
                    <input type="url" id="editManifestUrl" required>
                </div>

                <div class="form-group">
                    <label>Poster URL</label>
                    <input type="url" id="editPosterUrl">
                </div>

                <div class="form-group">
                    <label>Status</label>
                    <select id="editStatus">
                        <option value="true">Active</option>
                        <option value="false">Inactive</option>
                    </select>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadChannels();
            loadAnalytics();

            // DRM toggle
            document.getElementById('enableDRM').addEventListener('change', (e) => {
                document.getElementById('drmConfig').style.display = e.target.checked ? 'block' : 'none';
            });
        });

        // Tab switching
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        // Load channels
        async function loadChannels() {
            try {
                const response = await fetch('/api/stream/channels');
                const data = await response.json();

                if (data.success) {
                    const tbody = document.getElementById('channelsTable');
                    tbody.innerHTML = '';

                    data.channels.forEach(channel => {
                        const row = `
                            <tr>
                                <td>${channel.name}</td>
                                <td>${channel.category}</td>
                                <td>
                                    <span class="badge ${channel.active ? 'badge-active' : 'badge-inactive'}">
                                        ${channel.active ? 'Active' : 'Inactive'}
                                    </span>
                                </td>
                                <td>
                                    ${channel.drm?.enabled ? '<span class="badge badge-drm">Enabled</span>' : '—'}
                                </td>
                                <td>
                                    <div class="action-buttons">
                                        <button class="btn btn-sm btn-secondary" onclick="editChannel(${channel.id})">Edit</button>
                                        <button class="btn btn-sm btn-danger" onclick="deleteChannel(${channel.id})">Delete</button>
                                    </div>
                                </td>
                            </tr>
                        `;
                        tbody.innerHTML += row;
                    });
                }
            } catch (err) {
                showAlert('error', 'Failed to load channels');
            }
        }

        // Add channel
        async function addChannel(e) {
            e.preventDefault();

            const drm = document.getElementById('enableDRM').checked ? {
                enabled: true,
                license_server_url: document.getElementById('licenseUrl').value,
                keys: {
                    key_id: document.getElementById('keyId').value,
                    key_value: document.getElementById('keyValue').value
                }
            } : { enabled: false };

            try {
                const response = await fetch('/api/stream/channel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('channelName').value,
                        category: document.getElementById('channelCategory').value,
                        manifest_url: document.getElementById('manifestUrl').value,
                        poster: document.getElementById('posterUrl').value || 'https://i.imgur.com/WA3r9kf.jpeg',
                        description: document.getElementById('channelDescription').value,
                        drm: drm
                    })
                });

                const data = await response.json();
                if (data.success) {
                    showAlert('success', 'Channel added successfully');
                    e.target.reset();
                    loadChannels();
                    switchTab('channels');
                } else {
                    showAlert('error', data.error);
                }
            } catch (err) {
                showAlert('error', 'Failed to add channel');
            }
        }

        // Edit channel
        async function editChannel(id) {
            try {
                const response = await fetch(`/api/stream/channel/${id}`);
                const data = await response.json();

                if (data.success) {
                    const channel = data.channel;
                    document.getElementById('editChannelId').value = channel.id;
                    document.getElementById('editName').value = channel.name;
                    document.getElementById('editCategory').value = channel.category;
                    document.getElementById('editManifestUrl').value = channel.manifest_url;
                    document.getElementById('editPosterUrl').value = channel.poster;
                    document.getElementById('editStatus').value = channel.active;
                    document.getElementById('editModal').classList.add('active');
                }
            } catch (err) {
                showAlert('error', 'Failed to load channel');
            }
        }

        // Update channel
        async function updateChannel(e) {
            e.preventDefault();

            const id = document.getElementById('editChannelId').value;

            try {
                const response = await fetch(`/api/stream/channel/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('editName').value,
                        category: document.getElementById('editCategory').value,
                        manifest_url: document.getElementById('editManifestUrl').value,
                        poster: document.getElementById('editPosterUrl').value,
                        active: document.getElementById('editStatus').value === 'true'
                    })
                });

                const data = await response.json();
                if (data.success) {
                    showAlert('success', 'Channel updated successfully');
                    closeModal();
                    loadChannels();
                } else {
                    showAlert('error', data.error);
                }
            } catch (err) {
                showAlert('error', 'Failed to update channel');
            }
        }

        // Delete channel
        async function deleteChannel(id) {
            if (!confirm('Are you sure you want to delete this channel?')) return;

            try {
                const response = await fetch(`/api/stream/channel/${id}`, {
                    method: 'DELETE'
                });

                const data = await response.json();
                if (data.success) {
                    showAlert('success', 'Channel deleted successfully');
                    loadChannels();
                } else {
                    showAlert('error', data.error);
                }
            } catch (err) {
                showAlert('error', 'Failed to delete channel');
            }
        }

        // Load analytics
        async function loadAnalytics() {
            try {
                const response = await fetch('/api/stream/analytics');
                const data = await response.json();

                if (data.success) {
                    document.getElementById('totalChannels').textContent = data.analytics.totalChannels;
                    document.getElementById('activeChannels').textContent = data.analytics.activeChannels;
                    document.getElementById('drmChannels').textContent = data.analytics.channelsWithDRM;
                    document.getElementById('lastUpdated').textContent = new Date(data.analytics.lastUpdated).toLocaleDateString();
                }
            } catch (err) {
                showAlert('error', 'Failed to load analytics');
            }
        }

        // Modal
        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        // Alert
        function showAlert(type, message) {
            const alertId = type === 'success' ? 'successAlert' : 'errorAlert';
            const alert = document.getElementById(alertId);
            alert.textContent = message;
            alert.classList.add('show');
            setTimeout(() => alert.classList.remove('show'), 5000);
        }

        // Close modal on outside click
        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });
    </script>
</body>
</html>
