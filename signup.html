<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign Up — Water Billing</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300,400,600,700&display=swap" rel="stylesheet">
  <style>
    :root{--bg-1:#667eea;--bg-2:#764ba2;--card-bg:rgba(255,255,255,0.98);--muted:#64748b}
    *{box-sizing:border-box}
    body{font-family:Poppins,system-ui,Arial;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bg-1),var(--bg-2));padding:24px}
    .card{background:var(--card-bg);padding:22px;border-radius:14px;max-width:480px;width:100%;box-shadow:0 12px 40px rgba(2,6,23,0.25)}
    h1{margin:0 0 8px 0}
    p{margin:0 0 14px 0;color:var(--muted)}
    .row{margin-bottom:12px}
    input{width:100%;padding:10px;border-radius:8px;border:1px solid #e6e9ef}
    button{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(90deg,#1e40af,#0ea5e9);color:#fff;font-weight:700}
    .small{font-size:0.9rem;color:var(--muted);margin-top:12px}
    a{color:#1e40af;text-decoration:none;font-weight:600}

    /* Notification styles */
    #notify { position: fixed; right: 16px; top: 16px; z-index: 9999; pointer-events: none; }
    #notify .note { pointer-events: auto; min-width:220px; max-width:420px; padding:14px 16px; border-radius:12px; color:#fff; box-shadow:0 12px 30px rgba(2,6,23,0.35); transform-origin:center; transform: perspective(600px) translateZ(0) rotateX(0); opacity:0; transition: transform 260ms cubic-bezier(.2,.9,.2,1), opacity 260ms; margin-top:10px }
    #notify .note.show { opacity:1; transform: perspective(600px) translateZ(18px) rotateX(0deg) }
    #notify .note.info { background: linear-gradient(135deg,#1e40af,#0ea5e9) }
    #notify .note.success { background: linear-gradient(135deg,#10b981,#059669) }
    #notify .note.error { background: linear-gradient(135deg,#ef4444,#f97316) }

    @media (max-width:480px){ .card{padding:16px;margin:12px} body{padding:12px} }
  </style>
</head>
<body>
  <div class="card">
    <h1>Create account</h1>
    <p class="small">Sign up to save billing records to your account. This demo stores accounts in-memory.</p>

    <form id="signupForm">
      <div class="row"><input type="text" id="name" placeholder="Full name" required></div>
      <div class="row"><input type="email" id="email" placeholder="Email address" required></div>
      <div class="row"><input type="tel" id="phone" placeholder="Phone (optional)" pattern="[0-9+\- ]{7,}" ></div>
      <div class="row"><input type="password" id="password" placeholder="Password" required></div>
      <button type="submit">Create account</button>
    </form>

    <div class="small">Already have an account? <a href="login.html">Sign in</a></div>
  </div>

  <div id="notify" aria-hidden="true"></div>

  <script>
    function showNotification(message, type = 'info', duration = 3000) {
      let container = document.getElementById('notify');
      if (!container) { container = document.createElement('div'); container.id = 'notify'; document.body.appendChild(container); }
      const el = document.createElement('div'); el.className = 'note ' + type; el.innerHTML = '<div style="font-weight:700">' + message + '</div>';
      container.appendChild(el);
      requestAnimationFrame(() => el.classList.add('show'));
      setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, duration);
    }

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;

      try{
        const resp = await fetch('/signup', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, phone, password })
        });
        const data = await resp.json();
        if (!resp.ok) {
          showNotification(data.error || 'Sign up failed', 'error', 3500);
          return;
        }
        showNotification('Account created. Signing in...', 'success', 1400);
        // Signed up and logged in — redirect to homepage
        setTimeout(() => { window.location.href = '/'; }, 900);
      } catch (err) {
        showNotification('Network error — please try again', 'error', 3000);
      }
    });
  </script>
</body>
</html>
