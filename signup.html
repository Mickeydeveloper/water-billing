<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unda Akaunti</title>
</head>
<body>
    <h1>Unda Akaunti</h1>
    <form>
        <label for="full-name">Jina Lako Kamili:</label>
        <input type="text" id="full-name" name="full-name">
        <br>
        <label for="email">Anwani ya Barua Pepe:</label>
        <input type="email" id="email" name="email">
        <br>
        <label for="phone">Simu (hiari):</label>
        <input type="tel" id="phone" name="phone">
        <br>
        <label for="password">Nenosiri:</label>
        <input type="password" id="password" name="password">
        <br>
        <button type="submit">Unda Akaunti</button>
    </form>
    <p>Una Akaunti Tayari? <a href="/login">Ingia</a></p>
    <a href="/home">Rudi Nyumbani</a>
</body>
</html>
