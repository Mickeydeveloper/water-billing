<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Billing Records History - Water Billing System">
  <meta name="author" content="Mickey Hamza">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Billing Records - History & Reports</title>
  
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/728/728093.png" type="image/png">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap">
  
  <style>
    /* ============================================
       RESET & VARIABLES
       ============================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary-color: #1e40af;
      --secondary-color: #0ea5e9;
      --success-color: #10b981;
      --error-color: #ef4444;
      --warning-color: #f59e0b;
      --background-light: #f8fafc;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --border-color: #e2e8f0;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.12);
      --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.15);
      --border-radius: 16px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ============================================
       BODY & LAYOUT
       ============================================ */
    body {
      font-family: 'Poppins', 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      color: var(--text-primary);
    }

    /* Notification styles (3D pop) */
    #notify { position: fixed; right: 16px; top: 16px; z-index: 9999; pointer-events: none; }
    #notify .note { pointer-events: auto; min-width:220px; max-width:420px; padding:14px 16px; border-radius:12px; color:#fff; box-shadow:0 12px 30px rgba(2,6,23,0.35); transform-origin:center; transform: perspective(600px) translateZ(0) rotateX(0); opacity:0; transition: transform 260ms cubic-bezier(.2,.9,.2,1), opacity 260ms; margin-top:10px }
    #notify .note.show { opacity:1; transform: perspective(600px) translateZ(18px) rotateX(0deg) }
    #notify .note.info { background: linear-gradient(135deg,#1e40af,#0ea5e9) }
    #notify .note.success { background: linear-gradient(135deg,#10b981,#059669) }
    #notify .note.error { background: linear-gradient(135deg,#ef4444,#f97316) }

    /* ============================================
       CONTAINER
       ============================================ */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 2.5rem;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow-lg);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* ============================================
       HEADER
       ============================================ */
    h1 {
      text-align: center;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 2rem;
      font-weight: 700;
      font-size: clamp(1.6rem, 5vw, 2rem);
    }

    /* ============================================
       CONTROLS SECTION
       ============================================ */
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 2px solid var(--border-color);
    }

    .controls-left,
    .controls-right {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    button,
    a.btn {
      padding: 0.85rem 1.25rem;
      border-radius: 8px;
      font-weight: 600;
      transition: var(--transition);
      font-family: 'Poppins', sans-serif;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      text-decoration: none;
      display: inline-block;
    }

    .btn-back {
      background: linear-gradient(135deg, #6366f1, #6b7280);
      color: #fff;
    }

    .btn-back:hover {
      background: linear-gradient(135deg, #6b7280, #4b5563);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .btn-clear {
      background: linear-gradient(135deg, var(--error-color), #dc2626);
      color: #fff;
    }

    .btn-clear:hover {
      background: linear-gradient(135deg, #dc2626, #991b1b);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .btn-export {
      background: linear-gradient(135deg, var(--success-color), #059669);
      color: #fff;
    }

    .btn-export:hover {
      background: linear-gradient(135deg, #059669, #047857);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    /* ============================================
       FILTER SECTION
       ============================================ */
    .filter-group {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .filter-group label {
      font-weight: 600;
      color: var(--text-primary);
    }

    select {
      padding: 0.85rem;
      border: 2px solid var(--border-color);
      background: #fff;
      border-radius: 8px;
      transition: var(--transition);
      color: var(--text-primary);
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      min-width: 200px;
    }

    select:focus {
      outline: none;
      border-color: var(--secondary-color);
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
    }

    /* ============================================
       STATISTICS SECTION
       ============================================ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: linear-gradient(135deg, rgba(30, 64, 175, 0.05), rgba(14, 165, 233, 0.05));
      padding: 1.5rem;
      border-radius: 12px;
      border: 2px solid var(--border-color);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, transparent, rgba(255,255,255,0.2));
      pointer-events: none;
    }

    .stat-card > * {
      position: relative;
      z-index: 1;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
      border-color: var(--secondary-color);
      background: linear-gradient(135deg, rgba(30, 64, 175, 0.1), rgba(14, 165, 233, 0.1));
    }

    .stat-label {
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary-color);
    }

    /* ============================================
       TABLE SECTION
       ============================================ */
    .table-wrapper {
      max-height: 70vh;
      overflow-y: auto;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 10;
    }

    th {
      padding: 1.25rem;
      text-align: left;
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      color: #fff;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      cursor: pointer;
      user-select: none;
      position: relative;
      transition: var(--transition);
    }

    th::after {
      content: ' ↕';
      font-size: 0.8rem;
      opacity: 0.5;
      margin-left: 0.5rem;
    }

    th:hover {
      opacity: 0.95;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
    }

    td {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border-color);
      background: #fff;
      color: var(--text-primary);
    }

    tbody tr {
      transition: var(--transition);
    }

    tbody tr:hover {
      background-color: rgba(14, 165, 233, 0.08);
      box-shadow: inset 1px 0 0 var(--secondary-color);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .total-cell {
      font-weight: 700;
      color: var(--success-color);
    }

    .action-cell {
      text-align: center;
    }

    .btn-delete {
      padding: 0.5rem 0.75rem;
      background: var(--error-color);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: var(--transition);
      font-family: 'Poppins', sans-serif;
      position: relative;
      overflow: hidden;
    }

    .btn-delete::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: translate(-50%, -50%);
      transition: width 0.4s, height 0.4s;
    }

    .btn-delete:hover::before {
      width: 200px;
      height: 200px;
    }

    .btn-delete:hover {
      background: #dc2626;
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }

    /* ============================================
       EMPTY STATE
       ============================================ */
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-secondary);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .empty-state-text {
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
    }

    .empty-state-btn {
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      color: #fff;
      padding: 0.85rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      transition: var(--transition);
    }

    .empty-state-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    /* ============================================
       RESPONSIVE
       ============================================ */
    @media (max-width: 768px) {
      .container {
        padding: 1.5rem;
      }

      .controls {
        flex-direction: column;
        gap: 1rem;
      }

      .controls-left,
      .controls-right {
        width: 100%;
        justify-content: center;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 0.85rem;
      }

      th,
      td {
        padding: 0.75rem;
      }

      .table-wrapper {
        max-height: 50vh;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 Billing Records History</h1>

    <!-- Controls Section -->
    <div class="controls">
      <div class="controls-left">
        <a href="main.html" class="btn btn-back">← Back to Billing</a>
      </div>

      <div style="text-align: right;">
        <div id="userName" style="font-weight: 600; color: var(--primary-color); margin-bottom: 0.5rem;">Loading...</div>
      </div>

      <div class="controls-right">
        <button class="btn btn-export" id="exportBtn" disabled>📥 Export to CSV</button>
        <button onclick="window.logout()" style="padding: 0.6rem 1rem; background: linear-gradient(135deg, #ef4444, #dc2626); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-family: 'Poppins', sans-serif;">Logout</button>
      </div>
    </div>

    <!-- Statistics Section -->
    <div class="stats-grid" id="statsGrid" style="display: none;">
      <div class="stat-card">
        <div class="stat-label">Total Records</div>
        <div class="stat-value" id="totalRecords">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Revenue</div>
        <div class="stat-value" id="totalRevenue">TZS 0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Average Bill</div>
        <div class="stat-value" id="averageBill">TZS 0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Usage</div>
        <div class="stat-value" id="totalUsage">0 units</div>
      </div>
    </div>

    <!-- Table Section -->
    <div class="table-wrapper" id="tableWrapper">
      <table id="recordsTable">
        <thead>
          <tr>
            <th onclick="sortTable(0)">Date</th>
            <th onclick="sortTable(1)">Customer</th>
            <th onclick="sortTable(2)">Phone</th>
            <th onclick="sortTable(3)">Usage (units)</th>
            <th onclick="sortTable(4)">Rate</th>
            <th onclick="sortTable(5)">Total Bill</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="recordsBody">
          <tr>
            <td colspan="7" style="text-align: center; padding: 3rem;">
              <div class="empty-state">
                <div class="empty-state-icon">📋</div>
                <div class="empty-state-text">No billing records found</div>
                <button class="empty-state-btn" onclick="window.location.href='main.html'">Create First Bill</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    /**
     * Billing Records Management System
     * Features:
     * - Load records from authenticated API
     * - Display billing history
     * - Export to CSV
     * - Delete records
     * - Statistics calculation
     */

    // ============================================
    // AUTHENTICATION CHECK & SESSION MANAGEMENT
    // ============================================
    
    // Configuration
    const AUTH_CONFIG = {
      redirectDelay: 1500,
      sessionWarningTime: 5 * 60 * 1000, // 5 minutes
      sessionTimeout: 7 * 24 * 60 * 60 * 1000, // 7 days
      checkInterval: 1000 // Check every second
    };

    let sessionCheckInterval = null;
    let authCheckComplete = false;

    window.addEventListener('DOMContentLoaded', () => {
      checkAuthentication();
      startSessionMonitor();
    });

    /**
     * Check if user is authenticated
     * Validates token and user data exist
     */
    function checkAuthentication() {
      const authToken = localStorage.getItem('authToken');
      const user = localStorage.getItem('user');
      const loginTime = localStorage.getItem('loginTime');

      // Check if both auth data exist
      if (!authToken || !user) {
        handleAuthenticationFailure('No authentication data found. Please log in.');
        return;
      }

      try {
        // Validate user data is valid JSON
        const userData = JSON.parse(user);
        
        // Validate required fields
        if (!userData.userId || !userData.email) {
          throw new Error('Invalid user data');
        }

        // Check session age
        if (loginTime) {
          const loginDate = new Date(loginTime);
          const sessionAge = Date.now() - loginDate.getTime();
          
          if (sessionAge > AUTH_CONFIG.sessionTimeout) {
            handleAuthenticationFailure('Your session has expired. Please log in again.');
            return;
          }
        }

        // Authentication successful
        displayUserInfo(userData);
        authCheckComplete = true;
        loadRecordsFromServer();
        console.log('✓ User authenticated:', userData.email);
        
      } catch (error) {
        console.error('❌ Authentication validation error:', error);
        handleAuthenticationFailure('Invalid authentication data. Please log in again.');
      }
    }

    /**
     * Handle authentication failure
     */
    function handleAuthenticationFailure(message) {
      console.warn('⚠️ Authentication check failed:', message);
      
      // Clear invalid auth data
      clearAuthData();
      
      // Show message and redirect
      showNotification(message, 'error', 3000);
      setTimeout(() => { window.location.href = 'login.html'; }, AUTH_CONFIG.redirectDelay);
    }

    /**
     * Display user information in header
     */
    function displayUserInfo(user) {
      try {
        const userName = document.getElementById('userName');
        if (userName) {
          userName.textContent = user.name || 'User';
        }
        console.log('✓ User info displayed');
      } catch (error) {
        console.error('Error displaying user info:', error);
      }
    }

    /**
     * Logout function
     * Clears all authentication data and redirects to login
     */
    function logout() {
      try {
        console.log('🔓 Logging out...');
        // Call server to clear session, then client cleanup
        fetch('/logout', { method: 'GET', credentials: 'same-origin' }).finally(() => {
          clearAuthData();
          showNotification('You have been logged out successfully.', 'success', 2000);
          setTimeout(() => { window.location.href = 'login.html'; }, 700);
        });
      } catch (error) {
        console.error('Logout error:', error);
        // Force redirect even if error occurs
        window.location.href = 'login.html';
      }
    }

    /**
     * Clear all authentication data
     */
    function clearAuthData() {
      localStorage.removeItem('authToken');
      localStorage.removeItem('user');
      localStorage.removeItem('loginTime');
      localStorage.removeItem('isDemo');
    }

    /**
     * Start monitoring session for expiration
     */
    function startSessionMonitor() {
      sessionCheckInterval = setInterval(() => {
        if (!authCheckComplete) return;

        const loginTime = localStorage.getItem('loginTime');
        if (!loginTime) return;

        const loginDate = new Date(loginTime);
        const sessionAge = Date.now() - loginDate.getTime();
        const timeRemaining = AUTH_CONFIG.sessionTimeout - sessionAge;

        // Warn user if session will expire soon
        if (timeRemaining > 0 && timeRemaining < AUTH_CONFIG.sessionWarningTime) {
          // Optional: Show warning
          // console.warn(`⚠️ Session expires in ${Math.round(timeRemaining / 60000)} minutes`);
        } else if (timeRemaining <= 0) {
          // Session expired
          handleAuthenticationFailure('Your session has expired. Please log in again.');
        }
      }, AUTH_CONFIG.checkInterval);
    }

    /**
     * Stop monitoring session
     */
    function stopSessionMonitor() {
      if (sessionCheckInterval) {
        clearInterval(sessionCheckInterval);
      }
    }

    // Make functions globally available
    window.logout = logout;
    window.isAuthenticated = () => localStorage.getItem('authToken') !== null;
    window.getCurrentUser = () => {
      const userStr = localStorage.getItem('user');
      return userStr ? JSON.parse(userStr) : null;
    };

    // Notification helper
    function showNotification(message, type = 'info', duration = 3000) {
      let container = document.getElementById('notify');
      if (!container) { container = document.createElement('div'); container.id = 'notify'; document.body.appendChild(container); }
      const el = document.createElement('div'); el.className = 'note ' + type; el.innerHTML = '<div style="font-weight:700">' + message + '</div>';
      container.appendChild(el);
      requestAnimationFrame(() => el.classList.add('show'));
      setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, duration);
    }

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
      stopSessionMonitor();
    });

    // ============================================
    // CONSTANTS & CONFIG
    // ============================================
    let allRecords = [];
    let filteredRecords = [];
    let sortColumn = 0;
    let sortAscending = false;

    // ============================================
    // DOM ELEMENTS
    // ============================================
    const monthFilter = document.getElementById('monthFilter');
    const recordsBody = document.getElementById('recordsBody');
    const exportBtn = document.getElementById('exportBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statsGrid = document.getElementById('statsGrid');
    const totalRecords = document.getElementById('totalRecords');
    const totalRevenue = document.getElementById('totalRevenue');
    const averageBill = document.getElementById('averageBill');
    const totalUsage = document.getElementById('totalUsage');

    // ============================================
    // API FUNCTIONS
    // ============================================

    /**
     * Get authorization header with token
     */
    function getAuthHeader() {
      const token = localStorage.getItem('authToken');
      return {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      };
    }

    /**
     * Load records from authenticated API
     */
    async function loadRecordsFromServer() {
      try {
        const response = await fetch('/get-records', {
          method: 'GET',
          headers: getAuthHeader()
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Failed to load records');
        }

        allRecords = (data.records || []).sort((a, b) => new Date(b.date) - new Date(a.date));
        populateMonthFilter();
        filterByMonth('');
      } catch (err) {
        console.error('Error loading records:', err);
        recordsBody.innerHTML = `
          <tr>
            <td colspan="7" style="padding: 3rem;">
              <div class="empty-state">
                <div class="empty-state-icon">⚠️</div>
                <div class="empty-state-text">Error loading records: ${err.message}</div>
              </div>
            </td>
          </tr>
        `;
      }
    }

    /**
     * Delete record from server
     */
    async function deleteRecordFromServer(recordId) {
      try {
        const response = await fetch(`/delete-record/${recordId}`, {
          method: 'DELETE',
          headers: getAuthHeader()
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Failed to delete record');
        }

        return true;
      } catch (err) {
        console.error('Error deleting record:', err);
        showNotification(`Failed to delete record: ${err.message}`, 'error', 3000);
        return false;
      }
    }

    // ============================================
    // UTILITY FUNCTIONS
    // ============================================

    /**
     * Format currency
     */
    function formatCurrency(value) {
      return Number(value).toLocaleString('en-US', {
        minimumFractionDigits: 0,
        maximumFractionDigits: 2
      });
    }

    /**
     * Format date
     */
    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      });
    }

    /**
     * Get unique months from records
     */
    function getUniqueMonths() {
      const months = new Set();
      allRecords.forEach(record => {
        const date = new Date(record.date);
        const monthYear = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
        months.add(monthYear);
      });
      return Array.from(months).sort().reverse();
    }

    /**
     * Populate month filter dropdown
     */
    function populateMonthFilter() {
      const months = getUniqueMonths();
      monthFilter.innerHTML = '<option value="">All Records</option>';

      months.forEach(month => {
        const [year, monthNum] = month.split('-');
        const monthName = new Date(year, monthNum - 1).toLocaleDateString('en-US', {
          year: 'numeric',
          month: 'long'
        });
        const option = document.createElement('option');
        option.value = month;
        option.textContent = monthName;
        monthFilter.appendChild(option);
      });
    }

    /**
     * Calculate statistics
     */
    function calculateStats(records) {
      if (records.length === 0) {
        statsGrid.style.display = 'none';
        return;
      }

      const total = records.reduce((sum, r) => sum + (r.total || 0), 0);
      const usage = records.reduce((sum, r) => sum + (r.usage || 0), 0);
      const average = records.length > 0 ? total / records.length : 0;

      totalRecords.textContent = records.length;
      totalRevenue.textContent = 'TZS ' + formatCurrency(total);
      averageBill.textContent = 'TZS ' + formatCurrency(average);
      totalUsage.textContent = usage + ' units';

      statsGrid.style.display = 'grid';
    }

    /**
     * Display records in table
     */
    function displayRecords(records) {
      if (records.length === 0) {
        recordsBody.innerHTML = `
          <tr>
            <td colspan="7" style="padding: 3rem;">
              <div class="empty-state">
                <div class="empty-state-icon">📋</div>
                <div class="empty-state-text">No records match your filter</div>
              </div>
            </td>
          </tr>
        `;
        statsGrid.style.display = 'none';
        exportBtn.disabled = true;
        return;
      }

      recordsBody.innerHTML = records.map(record => `
        <tr>
          <td>${formatDate(record.date)}</td>
          <td>${record.name || '-'}</td>
          <td>${record.phone || '-'}</td>
          <td>${record.usage || 0}</td>
          <td>TZS ${formatCurrency(record.rate || 0)}</td>
          <td class="total-cell">TZS ${formatCurrency(record.total || 0)}</td>
          <td class="action-cell">
            <button class="btn-delete" onclick="deleteRecord(${record.id})">Delete</button>
          </td>
        </tr>
      `).join('');

      calculateStats(records);
      exportBtn.disabled = false;
    }

    /**
     * Filter records by month
     */
    function filterByMonth(month) {
      if (!month) {
        filteredRecords = [...allRecords];
      } else {
        filteredRecords = allRecords.filter(r => {
          const date = new Date(r.date);
          const monthYear = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
          return monthYear === month;
        });
      }
      displayRecords(filteredRecords);
    }

    /**
     * Sort table
     */
    function sortTable(column) {
      sortColumn = column;
      sortAscending = !sortAscending;

      filteredRecords.sort((a, b) => {
        let aVal, bVal;

        switch (column) {
          case 0: // Date
            aVal = new Date(a.date);
            bVal = new Date(b.date);
            break;
          case 1: // Name
            aVal = a.name || '';
            bVal = b.name || '';
            break;
          case 2: // Phone
            aVal = a.phone || '';
            bVal = b.phone || '';
            break;
          case 3: // Usage
            aVal = a.usage || 0;
            bVal = b.usage || 0;
            break;
          case 4: // Rate
            aVal = a.rate || 0;
            bVal = b.rate || 0;
            break;
          case 5: // Total
            aVal = a.total || 0;
            bVal = b.total || 0;
            break;
          default:
            return 0;
        }

        if (typeof aVal === 'string') {
          aVal = aVal.toLowerCase();
          bVal = bVal.toLowerCase();
          return sortAscending ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
        }

        return sortAscending ? aVal - bVal : bVal - aVal;
      });

      displayRecords(filteredRecords);
    }

    /**
     * Delete a record
     */
    async function deleteRecord(id) {
      if (!confirm('Are you sure you want to delete this record?')) {
        return;
      }

      const success = await deleteRecordFromServer(id);
      if (success) {
        allRecords = allRecords.filter(r => r.id !== id);
        monthFilter.value = '';
        populateMonthFilter();
        filterByMonth('');
      }
    }

    /**
     * Export to CSV
     */
    function exportToCSV() {
      if (filteredRecords.length === 0) {
        showNotification('No records to export', 'info', 2200);
        return;
      }

      const headers = ['Date', 'Customer', 'Phone', 'Previous', 'Current', 'Usage', 'Rate', 'Fixed', 'Total'];
      const rows = filteredRecords.map(r => [
        formatDate(r.date),
        r.name,
        r.phone,
        r.prev,
        r.curr,
        r.usage,
        r.rate,
        r.fixed,
        r.total
      ]);

      let csv = headers.join(',') + '\n';
      rows.forEach(row => {
        csv += row.map(cell => `"${cell}"`).join(',') + '\n';
      });

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `billing-records-${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
      window.URL.revokeObjectURL(url);
    }

    // ============================================
    // EVENT LISTENERS
    // ============================================

    monthFilter.addEventListener('change', (e) => {
      filterByMonth(e.target.value);
    });

    exportBtn.addEventListener('click', exportToCSV);

    if (clearBtn) {
      clearBtn.addEventListener('click', () => {
        showNotification('To delete all records, please contact system administrator.', 'info', 3000);
      });
    }

    console.log('Billing Records system initialized successfully');
  </script>
</body>
</html>
