<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billing Records | Mickey Tanzanite</title>

  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/728/728093.png">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family:'Poppins',sans-serif;
      background: linear-gradient(135deg,#1e3a8a,#1e40af,#06b6d4);
      min-height:100vh;
      padding:15px;
    }

    .navbar {
      background: linear-gradient(135deg,#2563eb,#06b6d4);
      color:white;
      padding:1.2rem;
      border-radius:12px;
      margin-bottom:20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .container {
      background:rgba(255,255,255,0.98);
      backdrop-filter:blur(10px);
      max-width:1200px;
      margin:0 auto;
      padding:2rem;
      border-radius:16px;
      box-shadow:0 12px 32px rgba(0,0,0,0.2);
    }

    .table-responsive {
      overflow-x:auto;
      margin-top: 1rem;
    }

    table { 
      width:100%; 
      border-collapse:collapse; 
      min-width: 800px;
    }

    th, td {
      padding:1.2rem;
      text-align:left;
      border-bottom:1px solid #e2e8f0;
    }

    th {
      background: #f8fafc;
      color:#1e3a8a;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.85rem;
    }

    tr:hover { background:#f1f5f9; transition: 0.3s; }

    .btn {
      padding:0.5rem 1rem;
      border:none;
      border-radius:8px;
      cursor:pointer;
      margin-right:5px;
      font-size:0.85rem;
      font-weight: 600;
      transition: 0.2s;
    }

    .btn:hover { opacity: 0.8; transform: translateY(-1px); }

    .btn-pay { background:#10b981; color:white; }
    .btn-sms { background:#3b82f6; color:white; }
    .btn-delete { background:#ef4444; color:white; }

    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: bold;
    }

    .status-paid { background: #dcfce7; color: #166534; }
    .status-pending { background: #fef9c3; color: #854d0e; }

    #loadingOverlay {
        text-align: center;
        padding: 20px;
        font-style: italic;
        color: #64748b;
    }
  </style>
</head>

<body>

<nav class="navbar">
  <a href="/" style="font-size:1.5rem;font-weight:800;color:white;text-decoration:none;">
    💧 Water Billing
  </a>
  <div id="userSection" style="font-weight: 600;">
    👤 <span id="userName">User</span>
  </div>
</nav>

<div class="container">
  <h1 style="text-align:center;color:#1e293b;margin-bottom:1.5rem;">📊 Billing Records History</h1>

  <div class="table-responsive">
    <table id="recordsTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Customer</th>
          <th>Phone</th>
          <th>Usage</th>
          <th>Total Amount</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="recordsBody">
          <tr><td colspan="7" id="loadingOverlay">🔄 Inatafuta data kutoka MongoDB...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
let allRecords = [];
let isAdmin = false;

window.addEventListener('DOMContentLoaded', () => {
  checkAuth();
});

// 1. Hakikisha User Amelogin
async function checkAuth() {
  try {
    const res = await fetch('/api/me', { credentials: 'same-origin' });
    if (!res.ok) throw new Error("Unauthorized");

    const data = await res.json();
    document.getElementById('userName').textContent = data.user.name || data.user.email;

    // Angalia kama ni Admin
    const adminRes = await fetch('/api/is-admin', { credentials: 'same-origin' });
    const adminData = await adminRes.json();
    isAdmin = adminData.isAdmin || false;

    // Baada ya Auth, pakia records
    loadRecords();

  } catch(e) {
    console.error("Auth Error:", e);
    window.location.href = '/login'; // Elekeza login kama hana session
  }
}

// 2. Vuta Records kutoka API
async function loadRecords() {
  try {
    const res = await fetch('/get-records', { credentials: 'same-origin' });

    if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);

    const data = await res.json();
    
    // API yako inatuma { success: true, records: [...] }
    allRecords = data.records || [];
    renderTable();

  } catch(e) {
    console.error("Load Records Error:", e);
    document.getElementById('recordsBody').innerHTML = `
      <tr>
        <td colspan="7" style="text-align:center; color:red; padding:20px;">
          ❌ Imeshindwa kusoma data. Hakikisha MongoDB imekuwa connected.
        </td>
      </tr>
    `;
  }
}

// 3. Tengeneza Table
function renderTable() {
  const tbody = document.getElementById('recordsBody');

  if (allRecords.length === 0) {
    tbody.innerHTML = `
      <tr>
        <td colspan="7" style="text-align:center; padding:30px; color:#94a3b8;">
          📭 Hakuna rekodi yoyote iliyopatikana kwenye database.
        </td>
      </tr>
    `;
    return;
  }

  tbody.innerHTML = allRecords.map(r => {
    // FIX: Tunatumia 'date' au 'createdAt' kulingana na muundo wa MongoDB yako
    const rawDate = r.date || r.createdAt;
    const formattedDate = rawDate ? new Date(rawDate).toLocaleDateString('en-GB') : 'N/A';
    
    const status = r.status || 'Pending';
    const statusClass = status.toLowerCase() === 'completed' || status.toLowerCase() === 'paid' 
                        ? 'status-paid' : 'status-pending';

    return `
      <tr>
        <td>${formattedDate}</td>
        <td style="font-weight:600;">${r.name || 'Mteja'}</td>
        <td>${r.phone || '-'}</td>
        <td>${r.usage || 0} m³</td>
        <td><strong style="color:#1e40af;">TZS ${Number(r.total || 0).toLocaleString()}</strong></td>
        <td><span class="badge ${statusClass}">${status}</span></td>
        <td>
          <button class="btn btn-pay" onclick="payNow('${r._id || r.id}')">Pay</button>
          <button class="btn btn-sms" onclick="sendSMS('${r.phone}','${r.name}',${r.total})">SMS</button>
          ${isAdmin ? `<button class="btn btn-delete" onclick="deleteRecord('${r._id || r.id}')">Delete</button>` : ''}
        </td>
      </tr>
    `;
  }).join('');
}

// 4. Kazi za Button
function payNow(id) {
  alert("Payment system (M-Pesa/Tigo) integration inakuja hivi karibuni mwanangu!");
}

function sendSMS(phone, name, total) {
    if(!phone) return alert("Namba ya simu haipo!");
    const msg = `Habari ${name}, Ankara yako ya maji ni TZS ${Number(total).toLocaleString()}. Tafadhali fanya malipo mapema.`;
    window.location.href = `sms:${phone}?body=${encodeURIComponent(msg)}`;
}

async function deleteRecord(id) {
  if (!confirm("Je, una uhakika unataka kufuta rekodi hii kabisa?")) return;

  try {
    // Hapa unahitaji kutuma request ya DELETE kwenye server
    const res = await fetch(`/api/records/${id}`, { 
        method: 'DELETE',
        credentials: 'same-origin'
    });
    
    if(res.ok) {
        alert("Imefutwa!");
        loadRecords(); // Refresh data
    } else {
        alert("Kuna tatizo limejitokeza wakati wa kufuta.");
    }
  } catch(e) {
      alert("Admin route ya kufuta haijaunganishwa vizuri.");
  }
}
</script>

</body>
</html>
