<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Water Billing Calculator</title>

  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/728/728093.png">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg,#1e3a8a,#06b6d4);
      padding:10px;
    }

    .container {
      background:white;
      max-width:580px;
      margin:auto;
      padding:2rem;
      border-radius:16px;
    }

    input {
      width:100%;
      padding:0.9rem;
      margin-top:8px;
      border:2px solid #ccc;
      border-radius:8px;
    }

    button {
      width:100%;
      padding:1rem;
      margin-top:1.5rem;
      background:#2563eb;
      color:white;
      border:none;
      border-radius:10px;
      cursor:pointer;
    }

    .result {
      margin-top:1rem;
      padding:1rem;
      border-radius:8px;
      display:none;
    }

    .success { background:#d1fae5; color:#065f46; }
    .error { background:#fee2e2; color:#7f1d1d; }
  </style>
</head>

<body>

<div class="container">

  <h2>💧 Billing Calculator</h2>

  <form id="form">

    <label>Name</label>
    <input type="text" id="name" required>

    <label>Phone</label>
    <input type="text" id="phone" required>

    <label>Previous</label>
    <input type="number" id="prev" value="0">

    <label>Current</label>
    <input type="number" id="curr" required>

    <label>Rate</label>
    <input type="number" id="rate" value="2000">

    <label>Fixed</label>
    <input type="number" id="fixed" value="0">

    <button type="submit" id="submitBtn">Save Bill</button>

  </form>

  <div id="result" class="result"></div>

  <button id="smsBtn" style="display:none;">📱 Send SMS</button>

</div>

<script>
let currentRecord = null;

// ================= SUBMIT =================
document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const btn = document.getElementById('submitBtn');
  btn.innerText = "Saving...";
  btn.disabled = true;

  try {
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const prev = Number(document.getElementById('prev').value) || 0;
    const curr = Number(document.getElementById('curr').value);
    const rate = Number(document.getElementById('rate').value);
    const fixed = Number(document.getElementById('fixed').value) || 0;

    if (!name || !phone) throw new Error("Fill all fields");

    if (curr < prev) {
      throw new Error("Current must be greater than previous");
    }

    const usage = curr - prev;
    const total = usage * rate + fixed;

    currentRecord = {
      name,
      phone,
      prev,
      curr,
      usage,
      rate,
      fixed,
      total,
      date: new Date().toISOString()
    };

    const res = await fetch('/save-record', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify(currentRecord)
    });

    if (!res.ok) throw new Error("Server error");

    showResult(`✅ Saved! Total: TZS ${total.toLocaleString()}`, "success");

    document.getElementById('smsBtn').style.display = "block";

    // reset form
    document.getElementById('form').reset();

  } catch (err) {
    console.error(err);
    showResult("❌ " + err.message, "error");
  }

  btn.innerText = "Save Bill";
  btn.disabled = false;
});

// ================= RESULT =================
function showResult(text, type) {
  const box = document.getElementById('result');
  box.innerText = text;
  box.className = "result " + (type === "success" ? "success" : "error");
  box.style.display = "block";
}

// ================= SMS =================
document.getElementById('smsBtn').addEventListener('click', () => {
  if (!currentRecord) return;

  const msg =
    `Bill for ${currentRecord.name}\n` +
    `Usage: ${currentRecord.usage} units\n` +
    `Total: TZS ${currentRecord.total.toLocaleString()}`;

  window.location.href =
    `sms:${currentRecord.phone}?body=${encodeURIComponent(msg)}`;
});
</script>

</body>
</html>
