<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mickey Glitch | Quantum Base Dev</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f5ff;
            --primary-glow: rgba(0, 245, 255, 0.3);
            --accent: #c026d3;
            --neon: #39ff14;
            --bg: #030305;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Background Grid */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: -1;
        }

        /* HEADER */
        .header {
            position: fixed; top: 0; width: 100%;
            backdrop-filter: blur(15px);
            background: rgba(3, 3, 5, 0.8);
            border-bottom: 1px solid var(--border);
            padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 2000;
        }

        .logo { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.5px; text-transform: uppercase; }
        .logo span { color: var(--primary); }

        /* HERO & LAYOUT */
        .hero { padding: 140px 20px 80px; text-align: center; max-width: 1200px; margin: 0 auto; }
        
        /* AUDIO PLAYER STYLING */
        .audio-container {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 20px;
            margin: 40px auto;
            max-width: 400px;
            backdrop-filter: blur(10px);
        }

        .audio-container h4 {
            font-size: 0.8rem;
            color: var(--primary);
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        input[type="file"] {
            font-size: 0.8rem;
            margin-bottom: 15px;
            color: #94a3b8;
        }

        audio {
            width: 100%;
            height: 40px;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5);
        }

        /* CHAT INTERFACE RE-STYLING */
        .chat-container {
            max-width: 800px; margin: 40px auto;
            background: rgba(15, 15, 20, 0.8);
            border: 1px solid var(--border);
            border-radius: 30px; overflow: hidden;
        }

        #chat-window {
            height: 400px; padding: 25px;
            overflow-y: auto; display: flex;
            flex-direction: column; gap: 15px;
            text-align: left;
        }

        .msg { max-width: 80%; padding: 12px 18px; border-radius: 18px; font-size: 0.95rem; }
        .mickey-msg { background: #1e1e24; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user-msg { background: linear-gradient(135deg, var(--primary), var(--accent)); color: #000; font-weight: 600; align-self: flex-end; border-bottom-right-radius: 2px; }

        .chat-input-area { padding: 20px; display: flex; gap: 10px; background: rgba(255,255,255,0.02); }
        .chat-input-area input { flex: 1; background: #000; border: 1px solid var(--border); padding: 15px 20px; border-radius: 15px; color: #fff; outline: none; }
        
        .send-btn { background: var(--primary); border: none; width: 50px; border-radius: 15px; cursor: pointer; display: flex; justify-content: center; align-items: center; }

        /* Rest of your styles... */
        .gradient-text { background: linear-gradient(90deg, #fff, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">MICKEY<span>GLITCH</span></div>
    </header>

    <main class="hero">
        <h1><span class="gradient-text">Mickey Audio & Chat</span></h1>
        
        <div class="audio-container">
            <h4>Local Media Player</h4>
            <input type="file" id="audioUpload" accept="audio/*">
            <audio id="audioPlayer" controls>
                Your browser does not support the audio element.
            </audio>
        </div>

        <section class="chat-container" id="chat">
            <div id="chat-window">
                <div class="msg mickey-msg">Habari! Mimi ni Mickey Glitch AI. Code imerekebishwa, sasa unaweza kutuma ujumbe.</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="Andika ujumbe hapa..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
            </div>
        </section>
    </main>

    <script>
        // 1. AUDIO PLAYER LOGIC
        const audioUpload = document.getElementById('audioUpload');
        const audioPlayer = document.getElementById('audioPlayer');

        audioUpload.addEventListener('change', function() {
            const files = this.files;
            if (files.length > 0) {
                const url = URL.createObjectURL(files[0]);
                audioPlayer.src = url;
                audioPlayer.play();
            }
        });

        // 2. CHAT LOGIC (FIXED)
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatWindow = document.getElementById('chat-window');
            const text = input.value.trim();

            if (!text) return;

            // User Message - FIXED: Aliyekuwa anasababisha error ni 'window.document'
            const userDiv = document.createElement('div');
            userDiv.className = 'msg user-msg';
            userDiv.textContent = text;
            chatWindow.appendChild(userDiv);
            
            input.value = '';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            // Thinking...
            const tempId = 'id' + Date.now();
            const thinking = document.createElement('div');
            thinking.className = 'msg mickey-msg';
            thinking.id = tempId;
            thinking.textContent = '...';
            chatWindow.appendChild(thinking);
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                // Kumbuka kubadilisha hii iwe endpoint yako halisi
                const response = await fetch(`/api/chat?text=${encodeURIComponent(text)}`);
                const data = await response.json();
                document.getElementById(tempId).innerText = data.reply || "Nimepokea ujumbe wako!";
            } catch (err) {
                document.getElementById(tempId).innerText = "Mickey Bot yupo offline, lakini ujumbe umefika!";
            }
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
