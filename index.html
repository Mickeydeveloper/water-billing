<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mfumo wa Bili za Maji</title>
</head>
<body>
    <h1>Mfumo wa Bili za Maji</h1>
    <div id="dashboard">
        <h2>Dashibodi</h2>
        <p>Jumla ya Bili: <span id="totalBills">0</span></p>
        <p>Jumla ya Mapato: <span id="totalRevenue">0</span></p>
        <p>Kawaida ya Bili: <span id="avgBill">0</span></p>
        <p>Jumla ya Matumizi: <span id="totalUsage">0</span></p>
    </div>
    <div id="quickGuide">
        <h2>Mwongozo wa Haraka</h2>
        <p>Tengeneza na hesabu bili za maji kwa kutumia chaguzi hapa chini.</p>
        <button id="createBill">Tengeneza Bili</button>
        <button id="viewHistory">Tazama Historia</button>
        <button id="refresh">Anzisha upya</button>
    </div>
    <div id="billingHistory">
        <button id="exportData">Hamisha data kwa uchanganuzi</button>
        <h3>Tazama historia kamili ya bili</h3>
    </div>
    <footer>
        <button id="logout">Toka</button>
        <p>Kuhusu</p>
    </footer>
    <script>
        console.log("Inapakua...");
    </script>
</body>
</html>
