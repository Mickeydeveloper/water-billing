<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg,#1e3a8a,#06b6d4);
      padding: 10px;
    }

    .dashboard {
      background: white;
      max-width: 800px;
      margin: auto;
      padding: 2rem;
      border-radius: 16px;
    }

    .box {
      border: 2px solid #2563eb;
      padding: 1rem;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 10px;
    }

    .btn {
      padding: 1rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="dashboard">

  <h2>💧 Dashboard</h2>

  <p id="userInfo">Loading user...</p>

  <div class="box">
    Total Bills: <span id="totalBills">0</span>
  </div>

  <div class="box">
    Total Revenue: <span id="totalRevenue">0</span>
  </div>

  <div class="box">
    Avg Bill: <span id="avgBill">0</span>
  </div>

  <div class="box">
    Total Usage: <span id="totalUsage">0</span>
  </div>

  <button class="btn" onclick="refreshDashboard()">Refresh</button>

</div>

<script>
let retryCount = 3;

window.addEventListener('DOMContentLoaded', () => {
  checkAuth();
});

// ================= AUTH =================
async function checkAuth() {
  try {
    const res = await fetch('/api/me', {
      credentials: 'same-origin'
    });

    if (!res.ok) throw new Error("Not logged in");

    const data = await res.json();
    document.getElementById('userInfo').innerText =
      "Welcome " + (data.user.name || data.user.email);

    loadDashboard();

  } catch(e) {
    console.error("Auth error:", e);
    window.location.href = "login.html";
  }
}

// ================= LOAD DASHBOARD =================
async function loadDashboard() {
  try {
    console.log("📡 Fetching records...");

    const res = await fetch('/get-records', {
      credentials: 'same-origin'
    });

    if (!res.ok) throw new Error("API ERROR " + res.status);

    const data = await res.json();
    console.log("📊 DATA:", data);

    const records = data.records || [];

    let totalBills = records.length;
    let totalRevenue = records.reduce((a,b)=>a+(b.total||0),0);
    let totalUsage = records.reduce((a,b)=>a+(b.usage||0),0);
    let avg = totalBills ? totalRevenue/totalBills : 0;

    document.getElementById('totalBills').innerText = totalBills;
    document.getElementById('totalRevenue').innerText = "TZS " + totalRevenue.toLocaleString();
    document.getElementById('avgBill').innerText = "TZS " + avg.toLocaleString();
    document.getElementById('totalUsage').innerText = totalUsage + " units";

    console.log("✅ Dashboard loaded");

  } catch(e) {
    console.error("❌ Dashboard error:", e);

    if (retryCount > 0) {
      retryCount--;
      console.log("🔁 Retrying...", retryCount);
      setTimeout(loadDashboard, 2000);
    } else {
      alert("Failed to load dashboard");
    }
  }
}

// ================= REFRESH =================
function refreshDashboard() {
  retryCount = 3;
  loadDashboard();
}
</script>

</body>
</html>
